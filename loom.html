    const btn = document.createElement("button");
    btn.className = "insp-btn";
    btn.textContent = "Clear this rule";
    btn.addEventListener("click", () => clearRule(path));
    actions.appendChild(btn);
    body.appendChild(actions);
  }
}

function renderSplitInspector(body, path, value) {
  const t = typeOf(value);
  if (t !== "array") {
    body.insertAdjacentHTML("beforeend", `<div class="insp-section"><div class="insp-help">Splitting is only available for arrays — select an array in the tree.</div></div>`);
    return;
  }
  const split = getSplit(path) || defaultSplit();

  // Enable
  const section = document.createElement("div");
  section.className = "insp-section";
  section.innerHTML = `<h3>Split into files</h3>`;
  const toggle = document.createElement("label");
  toggle.className = "insp-toggle";
  toggle.innerHTML = `<input type="checkbox" ${split.enabled ? "checked" : ""}> <span>Split this array — each item becomes its own file (Markdown) or sheet (Excel)</span>`;
  toggle.querySelector("input").addEventListener("change", (e) => setSplit(path, { enabled: e.target.checked }));
  section.appendChild(toggle);
  body.appendChild(section);

  if (!split.enabled) return;

  // Template
  const tmpl = document.createElement("div");
  tmpl.className = "insp-section";
  tmpl.innerHTML = `<h3>Filename template</h3>`;
  const row = document.createElement("div"); row.className = "insp-row";
  const input = document.createElement("input");
  input.type = "text"; input.className = "insp-input";
  input.value = split.template;
  input.addEventListener("input", () => setSplit(path, { template: input.value }));
  row.appendChild(input);
  tmpl.appendChild(row);

  const tokens = document.createElement("div"); tokens.className = "insp-tokens";
  tokens.innerHTML = `Tokens:
    <code>{i}</code> index,
    <code>{i:02}</code> padded,
    <code>{key}</code>,
    <code>{.field}</code> field from item,
    <code>{parent.x}</code>`;
  tmpl.appendChild(tokens);
  body.appendChild(tmpl);

  // Slug options
  const slug = document.createElement("div");
  slug.className = "insp-section";
  slug.innerHTML = `<h3>Slug options</h3>`;
  const opts = [
    ["lowercase", "Lowercase"],
    ["dashes", "Replace spaces with dashes"],
    ["stripAccents", "Strip accents (ä → a, ö → o)"],
  ];
  for (const [k, label] of opts) {
    const lab = document.createElement("label"); lab.className = "insp-toggle";
    lab.innerHTML = `<input type="checkbox" ${split.slug[k] ? "checked" : ""}> <span>${label}</span>`;
    lab.querySelector("input").addEventListener("change", (e) => setSplit(path, { slug: { [k]: e.target.checked } }));
    slug.appendChild(lab);
  }
  const lenRow = document.createElement("div"); lenRow.className = "insp-row";
  lenRow.innerHTML = `<label>Max length</label>`;
  const lenInput = document.createElement("input");
  lenInput.type = "number"; lenInput.min = "10"; lenInput.max = "200"; lenInput.className = "insp-input"; lenInput.value = split.slug.maxLength;
  lenInput.addEventListener("change", () => setSplit(path, { slug: { maxLength: parseInt(lenInput.value) || 60 } }));
  lenRow.appendChild(lenInput);
  slug.appendChild(lenRow);
  body.appendChild(slug);

  // Per-file front matter (applied to every child file before its rendering)
  const fmSection = document.createElement("div");
  fmSection.className = "insp-section";
  fmSection.innerHTML = `<h3>Front matter (every file)</h3>`;
  const fmRow = document.createElement("div"); fmRow.className = "insp-row";
  const fmTa = document.createElement("textarea");
  fmTa.className = "insp-input insp-textarea";
  fmTa.rows = 5;
  fmTa.placeholder = `---\ntitle: {.name}\nindex: {.id}\n---\n`;
  fmTa.spellcheck = false;
  fmTa.value = split.frontMatter || "";
  fmTa.addEventListener("input", debounced(() => setSplit(path, { frontMatter: fmTa.value }), 400));
  fmRow.appendChild(fmTa);
  fmSection.appendChild(fmRow);
  fmSection.insertAdjacentHTML("beforeend", `
    <div class="insp-help">Prepended to every split file, supporting the same tokens as annotations (<code>{.field}</code>, <code>{parent.x}</code>, <code>{$.field}</code>).</div>
  `);
  body.appendChild(fmSection);

  // Preview
  const previewSection = document.createElement("div");
  previewSection.className = "insp-section";
  previewSection.innerHTML = `<h3>Preview</h3>`;
  const list = document.createElement("div"); list.className = "file-list";
  const parentPath = path.slice(0, -1);
  const parent = parentPath.length === 0 ? state.doc : getAt(state.doc, parentPath);
  value.slice(0, 8).forEach((item, i) => {
    const raw = resolveTemplate(split.template, item, i, value, parent);
    const name = applySlug(raw, split.slug);
    const row = document.createElement("div"); row.className = "file-list-item";
    row.innerHTML = `<span>${name}</span><span class="size">item ${i+1}</span>`;
    list.appendChild(row);
  });
  if (value.length > 8) {
    const row = document.createElement("div"); row.className = "file-list-item";
    row.innerHTML = `<span class="size">… ${value.length - 8} more</span><span></span>`;
    list.appendChild(row);
  }
  previewSection.appendChild(list);
  body.appendChild(previewSection);
}

function escapeHtmlAttr(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ══════════════════════════════════════════════════════════════
   FILE I/O
   ══════════════════════════════════════════════════════════════ */
function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
}

function saveJson() {
  const blob = new Blob([JSON.stringify(state.doc, null, 2)], { type: "application/json" });
  const name = inferDocName() + ".json";
  triggerDownload(blob, name);
  state.dirty = false;
  // If the doc had no name yet, derive one from inferDocName so the tab
  // bar shows the same label the file was saved with.
  if (!state.docName) state.docName = name.replace(/\.json$/i, "");
  updateDocName();
  syncTabUI();
  flashStatus(`Saved ${name}`);
}

function inferDocName() {
  if (state.docName) return state.docName;
  if (state.doc && typeof state.doc === "object" && !Array.isArray(state.doc)) {
    if (typeof state.doc.title === "string" && state.doc.title) return slugify(state.doc.title, { lowercase: true, dashes: true, stripAccents: true, maxLength: 60 });
    if (typeof state.doc.name === "string" && state.doc.name) return slugify(state.doc.name, { lowercase: true, dashes: true, stripAccents: true, maxLength: 60 });
  }
  return "document";
}

async function exportMd() {
  const files = generateFiles();
  if (files.length === 1) {
    const blob = new Blob([files[0].content], { type: "text/markdown" });
    triggerDownload(blob, files[0].name);
    flashStatus(`Exported ${files[0].name}`);
    return;
  }
  if (window.__JSZIP_MISSING || typeof JSZip === "undefined") {
    // Fall back: download each separately
    files.forEach(f => {
      const blob = new Blob([f.content], { type: "text/markdown" });
      triggerDownload(blob, f.name);
    });
    flashStatus(`Exported ${files.length} files individually (JSZip unavailable)`);
    return;
  }
  const zip = new JSZip();
  for (const f of files) zip.file(f.name, f.content);
  const blob = await zip.generateAsync({ type: "blob" });
  triggerDownload(blob, inferDocName() + ".zip");
  flashStatus(`Exported ${files.length} files as zip`);
}

function exportXlsx() {
  if (window.__XLSX_MISSING || typeof XLSX === "undefined") {
    flashStatus("XLSX library unavailable (offline?)", true);
    return;
  }
  const buf = generateXLSXBlob();
  if (!buf) { flashStatus("Nothing to export", true); return; }
  const blob = new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
  triggerDownload(blob, inferDocName() + ".xlsx");
  flashStatus(`Exported ${inferDocName()}.xlsx`);
}

function openFile() {
  document.getElementById("file-input").click();
}

document.getElementById("file-input").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const result = loadJsonText(reader.result, file.name);
    if (!result.ok) {
      showErrorBanner(`Couldn't open ${file.name}`, result.detail);
      return;
    }
    // If current tab is fresh and empty, reuse it. Otherwise spawn a new tab.
    if (!isActiveTabFresh()) newTab();
    state.history = { past: [], future: [] };
    state.doc = result.value;
    state.docName = file.name.replace(/\.json$/i, "");
    state.rules = {};
    state.splits = {};
    state.annotations = {};
    state.docFrontMatter = "";
    state.selection = null;
    state.expanded = new Set([pathKey([])]);
    state.search = "";
    state.dirty = false;
    syncSearchInput();
    afterChange();
    flashStatus(`Loaded ${file.name}`);
  };
  reader.onerror = () => {
    showErrorBanner(`Couldn't read ${file.name}`, "The file could not be read by the browser.");
  };
  reader.readAsText(file);
  e.target.value = "";
});

/** Validate JSON text and produce a friendly error message.
 *  Catches common cases: empty files, files that look like other formats,
 *  and parse errors with a hint at the offending position. */
function loadJsonText(text, filename) {
  if (text == null || text === "") {
    return { ok: false, detail: "The file is empty." };
  }
  const trimmed = String(text).trim();
  if (trimmed === "") {
    return { ok: false, detail: "The file contains only whitespace." };
  }
  // Sniff the first few characters for non-JSON formats. Run these
  // before the parse so we can give a more specific message.
  if (/^<\?xml|^<!DOCTYPE|^<[a-zA-Z]/.test(trimmed)) {
    return { ok: false, detail: "This looks like XML or HTML, not JSON." };
  }
  if (/^---\s*$/m.test(trimmed.split("\n")[0]) || /^[a-zA-Z][a-zA-Z0-9_-]*\s*:\s/m.test(trimmed)) {
    return { ok: false, detail: "This looks like YAML, not JSON." };
  }
  if (/^[^\{\[\"\-0-9tfn]/.test(trimmed)) {
    // Doesn't start with anything JSON allows
    return { ok: false, detail: "This doesn't look like JSON. JSON values start with one of: { [ \" or a number/true/false/null." };
  }
  try {
    const parsed = JSON.parse(text);
    return { ok: true, value: parsed };
  } catch (err) {
    const msg = err && err.message ? err.message : "Couldn't parse as JSON.";
    return { ok: false, detail: `Parse error: ${msg}` };
  }
}

/* ══════════════════════════════════════════════════════════════
   AUTOSAVE
   ══════════════════════════════════════════════════════════════ */
const LS_KEY = "loom:draft:current";
const LS_PRESETS = "loom:presets";

let autosaveTimer = null;
function scheduleAutosave() {
  clearTimeout(autosaveTimer);
  setStatus("Editing…", "saving");
  autosaveTimer = setTimeout(doAutosave, AUTOSAVE_DEBOUNCE);
}

function doAutosave() {
  try {
    // Snapshot the live state into the active tab first
    captureActiveTab();
    const payload = {
      tabs: state.tabs.map(t => ({
        id: t.id,
        doc: t.doc,
        docName: t.docName,
        rules: t.rules,
        splits: t.splits,
        annotations: t.annotations,
        docFrontMatter: t.docFrontMatter,
        dirty: t.dirty,
        // selection/expanded/search/history are session state — not persisted
      })),
      activeTabId: state.activeTabId,
      savedAt: Date.now(),
    };
    localStorage.setItem(LS_KEY, JSON.stringify(payload));
    state.lastSaved = payload.savedAt;
    setStatus(`Autosaved ${relTime(payload.savedAt)}`, "ok");
  } catch (err) {
    setStatus("Autosave failed (storage full?)", "error");
  }
}

function loadDraft() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    // Backward-compat: old single-doc format → wrap into one tab.
    if (!data.tabs && data.doc !== undefined) {
      return {
        tabs: [{
          id: "tab-restored",
          doc: data.doc,
          docName: data.docName || null,
          rules: data.rules || {},
          splits: data.splits || {},
          annotations: data.annotations || {},
          docFrontMatter: data.docFrontMatter || "",
          dirty: true,
        }],
        activeTabId: "tab-restored",
        savedAt: data.savedAt,
      };
    }
    return data;
  } catch { return null; }
}

function discardDraft() { localStorage.removeItem(LS_KEY); }

function relTime(ts) {
  const s = Math.max(1, Math.round((Date.now() - ts) / 1000));
  if (s < 60) return `${s}s ago`;
  const m = Math.round(s / 60); if (m < 60) return `${m}m ago`;
  const h = Math.round(m / 60); if (h < 24) return `${h}h ago`;
  return new Date(ts).toLocaleString();
}

/* Presets */
function loadPresets() {
  try { return JSON.parse(localStorage.getItem(LS_PRESETS) || "{}"); }
  catch { return {}; }
}
function savePresets(p) { localStorage.setItem(LS_PRESETS, JSON.stringify(p)); }

function applyPreset(name) {
  const presets = loadPresets();
  if (!presets[name]) return;
  pushHistory();
  state.rules = { ...(presets[name].rules || {}) };
  state.splits = { ...(presets[name].splits || {}) };
  state.annotations = { ...(presets[name].annotations || {}) };
  state.docFrontMatter = presets[name].docFrontMatter || "";
  state.preset = name;
  afterChange();
  flashStatus(`Applied preset: ${name}`);
}

function saveCurrentAsPreset() {
  const name = prompt("Preset name:");
  if (!name) return;
  const presets = loadPresets();
  if (presets[name] && !confirm(`Overwrite existing preset "${name}"?`)) return;
  presets[name] = {
    rules: state.rules,
    splits: state.splits,
    annotations: state.annotations,
    docFrontMatter: state.docFrontMatter,
    savedAt: Date.now(),
  };
  savePresets(presets);
  state.preset = name;
  refreshPresetSelect();
  flashStatus(`Saved preset: ${name}`);
}

function deletePreset(name) {
  const presets = loadPresets();
  if (!presets[name]) return;
  if (!confirm(`Delete preset "${name}"?`)) return;
  delete presets[name];
  savePresets(presets);
  if (state.preset === name) state.preset = null;
  refreshPresetSelect();
  flashStatus(`Deleted preset: ${name}`);
}

function exportPreset(name) {
  const presets = loadPresets();
  if (!presets[name]) return;
  const payload = { version: 1, name, ...presets[name] };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  triggerDownload(blob, slugify(name, { lowercase: true, dashes: true, stripAccents: true, maxLength: 60 }) + ".loom-preset.json");
  flashStatus(`Exported preset: ${name}`);
}

function importPresetFromFile() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";
  input.addEventListener("change", () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const presets = loadPresets();
        let imported = 0;
        const add = (n, body) => {
          if (presets[n] && !confirm(`Overwrite existing preset "${n}"?`)) return;
          presets[n] = {
            rules: body.rules || {},
            splits: body.splits || {},
            annotations: body.annotations || {},
            docFrontMatter: body.docFrontMatter || "",
            savedAt: Date.now(),
          };
          imported++;
        };
        if (data.presets && typeof data.presets === "object") {
          for (const [n, body] of Object.entries(data.presets)) add(n, body);
        } else if (data.name) {
          add(data.name, data);
        } else {
          const n = prompt("Preset name:", file.name.replace(/\.json$/i, ""));
          if (!n) return;
          add(n, data);
        }
        savePresets(presets);
        refreshPresetSelect();
        flashStatus(`Imported ${imported} preset${imported !== 1 ? "s" : ""}`);
      } catch (err) {
        flashStatus(`Invalid preset file: ${err.message}`, true);
      }
    };
    reader.readAsText(file);
  });
  input.click();
}

function showPresetManager() {
  const presets = loadPresets();
  const names = Object.keys(presets);
  const modal = document.createElement("div");
  modal.className = "modal-backdrop";
  const rows = names.length === 0
    ? `<div class="insp-placeholder" style="padding:20px 0;">No presets saved yet. Use <strong>Save as…</strong> to create one.</div>`
    : names.map(n => `
        <div class="preset-row">
          <span class="preset-name">${escapeHtmlAttr(n)}</span>
          <button class="insp-btn" data-act="export" data-name="${escapeHtmlAttr(n)}">⇩ Export</button>
          <button class="insp-btn" data-act="delete" data-name="${escapeHtmlAttr(n)}">× Delete</button>
        </div>`).join("");
  modal.innerHTML = `
    <div class="modal">
      <h2>Manage presets</h2>
      <div id="preset-list">${rows}</div>
      <hr style="border:0;border-top:1px solid var(--hairline);margin:16px 0;">
      <button class="insp-btn" id="preset-import">⇧ Import preset file…</button>
      <div class="modal-actions">
        <button class="insp-btn primary" id="preset-close">Close</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  const close = () => modal.remove();
  modal.querySelector("#preset-close").addEventListener("click", close);
  modal.addEventListener("click", (e) => { if (e.target === modal) close(); });
  modal.querySelector("#preset-import").addEventListener("click", () => { close(); importPresetFromFile(); });
  modal.querySelectorAll("button[data-act]").forEach(btn => {
    btn.addEventListener("click", () => {
      const name = btn.dataset.name;
      if (btn.dataset.act === "export") exportPreset(name);
      else if (btn.dataset.act === "delete") { deletePreset(name); close(); showPresetManager(); }
    });
  });
}

function refreshPresetSelect() {
  const sel = document.getElementById("preset-select");
  const presets = loadPresets();
  sel.innerHTML = `<option value="">— none —</option>`;
  for (const name of Object.keys(presets)) {
    const o = document.createElement("option");
    o.value = name; o.textContent = name;
    if (state.preset === name) o.selected = true;
    sel.appendChild(o);
  }
}

/* ══════════════════════════════════════════════════════════════
   STATUS & UI WIRING
   ══════════════════════════════════════════════════════════════ */
function setStatus(text, kind = "ok") {
  const el = document.getElementById("autosave-status");
  const dotClass = kind === "saving" ? "dot saving" : "dot";
  el.innerHTML = `<span class="${dotClass}"></span>${text}`;
}

function flashStatus(text, isError = false) {
  setStatus(text, isError ? "error" : "ok");
  setTimeout(() => { if (state.lastSaved) setStatus(`Autosaved ${relTime(state.lastSaved)}`); }, 2500);
}

/** Show a prominent dismissable banner — used for things the user really
 *  needs to notice, like a failed file open. Auto-dismisses after a delay
 *  unless dismissed manually.  Distinct from the more subtle status bar. */
function showErrorBanner(title, detail) {
  // Remove any existing error banner first
  document.querySelectorAll(".banner.error-banner").forEach(b => b.remove());
  const banner = document.createElement("div");
  banner.className = "banner error-banner";
  banner.innerHTML = `
    <span class="banner-icon">⚠</span>
    <span class="banner-text">
      <strong>${escapeHtmlAttr(title)}</strong>
      ${detail ? `<br><span class="banner-detail">${escapeHtmlAttr(detail)}</span>` : ""}
    </span>
    <button class="banner-close" title="Dismiss">×</button>
  `;
  document.body.appendChild(banner);
  const dismiss = () => banner.remove();
  banner.querySelector(".banner-close").addEventListener("click", dismiss);
  setTimeout(dismiss, 8000);
}

function updateDocStats() {
  let nodes = 0;
  function count(v) { nodes++; if (v && typeof v === "object") { if (Array.isArray(v)) v.forEach(count); else Object.values(v).forEach(count); } }
  count(state.doc);
  const rules = Object.keys(state.rules).length;
  const splits = Object.values(state.splits).filter(s => s.enabled).length;
  const anns = Object.keys(state.annotations).length;
  const parts = [`${nodes} nodes`, `${rules} rule${rules!==1?"s":""}`, `${splits} split${splits!==1?"s":""}`];
  if (anns > 0) parts.push(`${anns} annotation${anns!==1?"s":""}`);
  document.getElementById("doc-stats").textContent = parts.join(" · ");
}

function afterChange() {
  renderTree();
  renderOutput();
  // Skip re-renders of panes containing focused text inputs/textareas.
  const active = document.activeElement;
  const isTextInput = active && (active.tagName === "TEXTAREA" ||
    (active.tagName === "INPUT" && (active.type === "text" || active.type === "number")));
  const inInspector = active && document.getElementById("pane-inspector")?.contains(active);
  const inEditor = active && document.getElementById("pane-editor")?.contains(active);
  if (!(inEditor && isTextInput)) renderEditor();
  if (!(inInspector && isTextInput)) renderInspector();
  updateDocStats();
  updateDocName();
  updateUndoButtons();
  syncTabUI();
  scheduleAutosave();
}

function updateDocName() {
  const el = document.getElementById("doc-name");
  if (!el) return;
  const textEl = el.querySelector(".doc-name-text");
  const displayName = state.docName ? state.docName + ".json" : "untitled";
  if (textEl) textEl.textContent = displayName;
  el.classList.toggle("untitled", !state.docName);
  el.classList.toggle("dirty", !!state.dirty);

  // Also update the browser tab title so unsaved state is visible there
  const base = "Loom";
  const prefix = state.dirty ? "● " : "";
  document.title = `${prefix}${displayName} — ${base}`;

  // Save JSON button gets an accent outline when dirty
  const saveBtn = document.getElementById("btn-save-json");
  if (saveBtn) saveBtn.classList.toggle("has-changes", !!state.dirty);
}

function updateAll() { afterChange(); }

/* ══════════════════════════════════════════════════════════════
   PANE RESIZE & COLLAPSE
   ══════════════════════════════════════════════════════════════ */
function setupPaneResize() {
  // direction: +1 means drag right = grow pane; -1 means drag right = shrink pane
  function makeDragger(dividerId, whichPane, direction) {
    const el = document.getElementById(dividerId);
    el.addEventListener("mousedown", (e) => {
      e.preventDefault();
      el.classList.add("dragging");
      const startX = e.clientX;
      const startW = state.panes[whichPane].w;
      const onMove = (ev) => {
        const dx = (ev.clientX - startX) * direction;
        const w = Math.max(180, Math.min(640, startW + dx));
        state.panes[whichPane].w = w;
        applyPaneWidths();
      };
      const onUp = () => {
        el.classList.remove("dragging");
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
      };
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  }
  // Dragging div-tree right grows the tree pane; div-editor right grows editor;
  // div-output right shrinks inspector.
  makeDragger("div-tree",   "tree",      +1);
  makeDragger("div-editor", "editor",    +1);
  makeDragger("div-output", "inspector", -1);
  applyPaneWidths();
}

function applyPaneWidths() {
  const panes = document.getElementById("panes");

  // Per-pane column width: either the user's px width or 28px if collapsed.
  // Output gets 1fr unless collapsed — in that case, hand the 1fr role to
  // whichever expanded pane makes the most sense so the UI still fills.
  const p = state.panes;
  const tree = p.tree.collapsed ? "28px" : p.tree.w + "px";
  const editor = p.editor.collapsed ? "28px" : p.editor.w + "px";
  const output = p.output.collapsed ? "28px" : "1fr";
  const insp = p.inspector.collapsed ? "28px" : p.inspector.w + "px";

  // Build the grid template. Normally: [tree] [div] [editor] [div] [output] [div] [inspector]
  let cols = [tree, "4px", editor, "4px", output, "4px", insp];

  // If output is collapsed, reassign the 1fr to the next available expanded pane.
  if (p.output.collapsed) {
    if (!p.inspector.collapsed) cols[6] = "1fr";
    else if (!p.editor.collapsed) cols[2] = "1fr";
    else if (!p.tree.collapsed) cols[0] = "1fr";
  }
  panes.style.gridTemplateColumns = cols.join(" ");

  // Toggle the .collapsed class on each pane element
  document.getElementById("pane-tree").classList.toggle("collapsed", p.tree.collapsed);
  document.getElementById("pane-editor").classList.toggle("collapsed", p.editor.collapsed);
  document.getElementById("pane-output").classList.toggle("collapsed", p.output.collapsed);
  document.getElementById("pane-inspector").classList.toggle("collapsed", p.inspector.collapsed);

  // Update chevron glyphs to point the right way
  document.getElementById("collapse-tree").textContent         = p.tree.collapsed      ? "⟩" : "⟨";
  document.getElementById("collapse-editor-left").textContent  = p.editor.collapsed    ? "⟩" : "⟨";
  document.getElementById("collapse-output").textContent       = p.output.collapsed    ? "⟨" : "⟩";
  document.getElementById("collapse-insp").textContent         = p.inspector.collapsed ? "⟨" : "⟩";

  // Disable dividers adjacent to a collapsed pane (dragging them would
  // be meaningless).
  document.getElementById("div-tree").classList.toggle("disabled",
    p.tree.collapsed || p.editor.collapsed);
  document.getElementById("div-editor").classList.toggle("disabled",
    p.editor.collapsed || p.output.collapsed);
  document.getElementById("div-output").classList.toggle("disabled",
    p.output.collapsed || p.inspector.collapsed);
}

function togglePane(which) {
  state.panes[which].collapsed = !state.panes[which].collapsed;
  applyPaneWidths();
}

/* ══════════════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════════════ */
function wireUp() {
  document.getElementById("btn-new").addEventListener("click", () => {
    // Always opens in a new tab; existing work is preserved
    newTab();
  });
  document.getElementById("btn-open").addEventListener("click", openFile);
  document.getElementById("btn-save-json").addEventListener("click", saveJson);
  document.getElementById("btn-export-md").addEventListener("click", exportMd);
  document.getElementById("btn-export-xlsx").addEventListener("click", exportXlsx);

  document.getElementById("btn-undo").addEventListener("click", undo);
  document.getElementById("btn-redo").addEventListener("click", redo);
  document.getElementById("btn-undo-tb").addEventListener("click", undo);
  document.getElementById("btn-redo-tb").addEventListener("click", redo);

  document.getElementById("collapse-tree").addEventListener("click", () => togglePane("tree"));
  document.getElementById("collapse-editor-left").addEventListener("click", () => togglePane("editor"));
  document.getElementById("collapse-output").addEventListener("click", () => togglePane("output"));
  document.getElementById("collapse-insp").addEventListener("click", () => togglePane("inspector"));

  // Click anywhere on a collapsed pane (not just on the chevron) to expand it.
  for (const [paneId, key] of [
    ["pane-tree", "tree"],
    ["pane-editor", "editor"],
    ["pane-output", "output"],
    ["pane-inspector", "inspector"],
  ]) {
    document.getElementById(paneId).addEventListener("click", (e) => {
      if (!state.panes[key].collapsed) return;
      // Avoid double-toggle when the chevron itself is the click target;
      // its own handler will run first and we should not undo it.
      if (e.target.classList && e.target.classList.contains("pane-collapse")) return;
      togglePane(key);
    });
  }

  document.getElementById("output-tabs").addEventListener("click", (e) => {
    if (!e.target.dataset.tab) return;
    state.outputTab = e.target.dataset.tab;
    document.querySelectorAll("#output-tabs .pane-tab").forEach(t => t.classList.toggle("active", t.dataset.tab === state.outputTab));
    renderOutput();
  });
  document.getElementById("insp-tabs").addEventListener("click", (e) => {
    if (!e.target.dataset.tab) return;
    state.inspectorTab = e.target.dataset.tab;
    document.querySelectorAll("#insp-tabs .pane-tab").forEach(t => t.classList.toggle("active", t.dataset.tab === state.inspectorTab));
    renderInspector();
  });

  document.getElementById("preset-select").addEventListener("change", (e) => {
    if (e.target.value) applyPreset(e.target.value);
  });
  document.getElementById("btn-save-preset").addEventListener("click", saveCurrentAsPreset);
  document.getElementById("btn-manage-presets").addEventListener("click", showPresetManager);

  document.getElementById("btn-help").addEventListener("click", showHelp);

  // Tree search
  const searchInput = document.getElementById("tree-search");
  const searchClear = document.getElementById("tree-search-clear");
  searchInput.addEventListener("input", debounced(() => {
    state.search = searchInput.value;
    renderTree();
  }, 150));
  searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      searchInput.value = "";
      state.search = "";
      renderTree();
      e.stopPropagation();
    }
    if (e.key === "ArrowDown") {
      // Move focus to tree-body so keyboard nav can take over
      e.preventDefault();
      document.getElementById("tree-body").focus();
    }
  });
  searchClear.addEventListener("click", () => {
    searchInput.value = "";
    state.search = "";
    renderTree();
    searchInput.focus();
  });

  // Tree keyboard navigation
  const treeBody = document.getElementById("tree-body");
  treeBody.addEventListener("keydown", (e) => {
    // Only handle when focus is on tree-body itself (not a child input)
    if (document.activeElement !== treeBody) return;
    handleTreeKeydown(e);
  });

  // Keyboard
  document.addEventListener("keydown", (e) => {
    const meta = e.ctrlKey || e.metaKey;
    if (meta && e.key === "z" && !e.shiftKey) { e.preventDefault(); undo(); }
    else if (meta && (e.key === "y" || (e.key === "z" && e.shiftKey))) { e.preventDefault(); redo(); }
    else if (meta && e.key === "s") { e.preventDefault(); saveJson(); }
    else if (meta && e.key === "o") { e.preventDefault(); openFile(); }
  });

  // Drag/drop JSON file onto app
  window.addEventListener("dragover", (e) => { e.preventDefault(); });
  window.addEventListener("drop", (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const result = loadJsonText(reader.result, file.name);
      if (!result.ok) {
        showErrorBanner(`Couldn't open ${file.name}`, result.detail);
        return;
      }
      if (!isActiveTabFresh()) newTab();
      state.history = { past: [], future: [] };
      state.doc = result.value;
      state.docName = file.name.replace(/\.json$/i, "");
      state.rules = {};
      state.splits = {};
      state.annotations = {};
      state.docFrontMatter = "";
      state.selection = null;
      state.expanded = new Set([pathKey([])]);
      state.search = "";
      state.dirty = false;
      syncSearchInput();
      afterChange();
      flashStatus(`Loaded ${file.name}`);
    };
    reader.onerror = () => {
      showErrorBanner(`Couldn't read ${file.name}`, "The file could not be read by the browser.");
    };
    reader.readAsText(file);
  });
}

function showHelp() {
  const modal = document.createElement("div");
  modal.className = "modal-backdrop";
  modal.innerHTML = `
    <div class="modal">
      <h2>Loom <span class="version-tag">${VERSION}</span></h2>
      <p><strong>Tree</strong>: click a node to select it; click the type pill to change its type; click a key or value to edit. Use + key / + item to add.</p>
      <p><strong>Rule</strong>: select a node, then in the right pane choose how to render it. Rules apply to all siblings of the same shape (so setting a rule on <code>projects[0]</code> applies to every project).</p>
      <p><strong>Split</strong>: on an array node, enable split to produce one output file per item. Filename templates accept <code>{i}</code>, <code>{i:02}</code>, <code>{.field}</code>, <code>{parent.x}</code>. Optional per-file front matter is injected at the top of each split file.</p>
      <p><strong>Annotations</strong>: free-form Markdown inserted before or after any node — useful for section dividers or intro/outro text. Supports the tokens <code>{.field}</code>, <code>{parent.field}</code>, <code>{$.field}</code>.</p>
      <p><strong>Document tab</strong>: document-wide front matter, applied to the single output file (or to <code>index.md</code> when splits are active). Use it for YAML headers consumed by Pandoc, Jekyll, Hugo, etc.</p>
      <p><strong>Tree markers</strong>: small chips next to each node show its active role (<code>table</code>, <code>list</code>, <code>skip</code>, <code>heading</code>), whether it's a <code>split</code> point, and whether it has an annotation (<code>※</code>).</p>
      <p><strong>Export</strong>: MD downloads a <code>.md</code> file (or <code>.zip</code> if splits are active). XLSX produces one sheet per table rule or split point.</p>
      <p><strong>Autosave</strong>: your draft is stored in the browser and restored next time.</p>
      <p style="font-size:11px;color:var(--muted);">Shortcuts: <kbd>Ctrl/⌘+Z</kbd> undo · <kbd>Ctrl/⌘+Shift+Z</kbd> redo · <kbd>Ctrl/⌘+S</kbd> save JSON · <kbd>Ctrl/⌘+O</kbd> open</p>
      <p style="font-size:11px;color:var(--muted);">Tree: <kbd>↑</kbd>/<kbd>↓</kbd> move · <kbd>←</kbd>/<kbd>→</kbd> collapse/expand · <kbd>Space</kbd> toggle · <kbd>Enter</kbd> edit in Editor · <kbd>Home</kbd>/<kbd>End</kbd> jump · right-click for Copy path/value</p>
      <p style="font-size:11px;color:var(--muted);margin-top:14px;border-top:1px solid var(--hairline);padding-top:10px;">
        Source, issues, and the latest release: <a href="https://github.com/jmkorhonen/json_loom" target="_blank" rel="noopener">github.com/jmkorhonen/json_loom</a>
      </p>
      <div class="modal-actions">
        <button class="insp-btn primary" id="help-close">Got it</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  const close = () => modal.remove();
  modal.querySelector("#help-close").addEventListener("click", close);
  modal.addEventListener("click", (e) => { if (e.target === modal) close(); });
}

function showRestoreBanner(draft) {
  const tabCount = Array.isArray(draft.tabs) ? draft.tabs.length : 1;
  const tabLabel = tabCount === 1 ? "1 tab" : `${tabCount} tabs`;
  const banner = document.createElement("div");
  banner.className = "banner accent";
  banner.innerHTML = `
    <span>Draft found from ${relTime(draft.savedAt)} (${tabLabel}). Restore it?</span>
    <button class="insp-btn primary" id="ban-restore">Restore</button>
    <button class="insp-btn" id="ban-discard">Discard</button>
  `;
  document.body.appendChild(banner);
  banner.querySelector("#ban-restore").addEventListener("click", () => {
    if (Array.isArray(draft.tabs) && draft.tabs.length > 0) {
      // Reconstruct tabs with fresh session state
      state.tabs = draft.tabs.map(t => ({
        id: t.id || ("tab-" + Date.now() + "-" + Math.random().toString(36).slice(2,7)),
        doc: t.doc,
        docName: t.docName || null,
        rules: t.rules || {},
        splits: t.splits || {},
        annotations: t.annotations || {},
        docFrontMatter: t.docFrontMatter || "",
        selection: null,
        expanded: new Set([pathKey([])]),
        search: "",
        outputTab: "preview",
        history: { past: [], future: [] },
        dirty: t.dirty !== false, // restored tabs default to "dirty" since they may have unsaved edits
        lastSaved: null,
      }));
      const target = state.tabs.find(t => t.id === draft.activeTabId) || state.tabs[0];
      loadTabIntoState(target);
    }
    banner.remove();
    syncSearchInput();
    afterChange();
    flashStatus("Draft restored");
  });
  banner.querySelector("#ban-discard").addEventListener("click", () => {
    discardDraft();
    banner.remove();
  });
}

function init() {
  const logoVer = document.getElementById("logo-ver");
  if (logoVer) logoVer.textContent = VERSION;

  // Bootstrap a single default tab. Existing state.* values become its
  // initial snapshot; further state lives in the tabs array.
  const firstTab = makeTabSnapshot();
  // Use the existing state.doc as the default tab's doc (preserves the
  // "title + sections: []" placeholder shown on first launch).
  firstTab.doc = state.doc;
  state.tabs = [firstTab];
  loadTabIntoState(firstTab);

  wireUp();
  setupPaneResize();

  // Prompt before leaving with unsaved edits
  window.addEventListener("beforeunload", (e) => {
    if (state.dirty || state.tabs.some(t => t.dirty)) {
      e.preventDefault();
      e.returnValue = "";
      return "";
    }
  });
  refreshPresetSelect();

  // Check for draft (new tabs-format or legacy single-doc)
  const draft = loadDraft();
  if (draft && (draft.tabs || draft.doc)) {
    showRestoreBanner(draft);
  }

  state.expanded.add(pathKey([]));
  syncTabUI();
  afterChange();

  // If external libs missing, flag it once
  if (window.__XLSX_MISSING) document.getElementById("btn-export-xlsx").disabled = true;
  setInterval(() => {
    if (state.lastSaved) {
      const el = document.getElementById("autosave-status");
      if (el.textContent.startsWith("Autosaved")) setStatus(`Autosaved ${relTime(state.lastSaved)}`);
    }
  }, 5000);
}

document.addEventListener("DOMContentLoaded", init);

</script>

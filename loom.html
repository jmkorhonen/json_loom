<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loom — JSON to Markdown</title>
<style>
/* ───────── Reset & base ───────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
input, select, textarea { font: inherit; color: inherit; }

:root {
  --paper: #f5f2ec;
  --paper-2: #ebe6da;
  --ink: #1a1a1a;
  --ink-2: #4a4a4a;
  --muted: #8a8374;
  --hairline: #d4cfc4;
  --hairline-strong: #b8b1a1;
  --accent: #b8572a;
  --accent-soft: #f0d9c4;
  --selection: #f5e5d0;
  --danger: #a13a2c;
  --ok: #3f6b3a;
  --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  --mono: ui-monospace, "SF Mono", "Menlo", "Consolas", "Liberation Mono", monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --shadow-sm: 0 1px 2px rgba(26, 26, 26, 0.06);
  --shadow: 0 4px 16px rgba(26, 26, 26, 0.08);
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}

/* ───────── App shell ───────── */
.app {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
}

/* ───────── Toolbar ───────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--hairline);
  background: var(--paper);
  position: relative;
}
.toolbar::after {
  content: "";
  position: absolute;
  inset: 0 0 -1px 0;
  pointer-events: none;
  border-bottom: 1px solid rgba(255,255,255,0.5);
}
.logo {
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  letter-spacing: 0.01em;
  color: var(--accent);
  margin-right: 18px;
  padding-right: 14px;
  border-right: 1px solid var(--hairline);
}
.logo::before { content: "⁂ "; color: var(--muted); font-style: normal; }
.logo-ver {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  font-style: normal;
  margin-left: 6px;
  letter-spacing: 0.05em;
  vertical-align: 2px;
}

.doc-name {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-2);
  padding: 3px 9px;
  background: var(--paper-2);
  border-radius: 3px;
  margin-right: 12px;
  max-width: 260px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  border: 1px solid transparent;
}
.doc-name:empty { display: none; }
.doc-name.untitled { color: var(--muted); font-style: italic; }

.tb-btn {
  padding: 5px 11px;
  border-radius: 4px;
  font-size: 12px;
  border: 1px solid transparent;
  color: var(--ink-2);
  transition: background 120ms, border-color 120ms, color 120ms;
}
.tb-btn:hover { background: var(--paper-2); color: var(--ink); border-color: var(--hairline); }
.tb-btn.primary { color: var(--accent); font-weight: 500; }
.tb-btn.primary:hover { background: var(--accent-soft); border-color: var(--accent); }
.tb-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.tb-sep { width: 1px; height: 18px; background: var(--hairline); margin: 0 8px; }
.tb-spacer { flex: 1; }

.preset-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.preset-wrap select {
  background: var(--paper-2);
  border: 1px solid var(--hairline);
  border-radius: 4px;
  padding: 4px 22px 4px 8px;
  font-size: 12px;
  color: var(--ink);
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238a8374' stroke-width='1.2' fill='none' stroke-linecap='round'/></svg>");
  background-repeat: no-repeat;
  background-position: right 7px center;
}

/* ───────── Pane grid ───────── */
.panes {
  display: grid;
  grid-template-columns: var(--pane-tree-w, 320px) 4px 1fr 4px var(--pane-insp-w, 340px);
  overflow: hidden;
  min-height: 0;
}
.panes.tree-collapsed { grid-template-columns: 28px 4px 1fr 4px var(--pane-insp-w, 340px); }
.panes.insp-collapsed { grid-template-columns: var(--pane-tree-w, 320px) 4px 1fr 4px 28px; }
.panes.tree-collapsed.insp-collapsed { grid-template-columns: 28px 4px 1fr 4px 28px; }

.divider {
  background: transparent;
  cursor: col-resize;
  position: relative;
  user-select: none;
}
.divider::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--hairline);
  transform: translateX(-0.5px);
}
.divider:hover::before, .divider.dragging::before { background: var(--accent); }

.pane {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
  background: var(--paper);
}
.pane-tree { border-right: 0; }
.pane-output { background: #fbf9f3; }
.pane-inspector { }

.pane-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-bottom: 1px solid var(--hairline);
  background: var(--paper);
  min-height: 36px;
}
.pane-title {
  font-family: var(--serif);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  font-weight: 500;
}
.pane-spacer { flex: 1; }
.pane-collapse {
  padding: 2px 6px;
  color: var(--muted);
  font-size: 12px;
  border-radius: 3px;
}
.pane-collapse:hover { background: var(--paper-2); color: var(--ink); }

/* Collapsed pane shows only a vertical strip with a button to reopen */
.pane.collapsed .pane-header { flex-direction: column; padding: 10px 0; border-bottom: 0; }
.pane.collapsed .pane-title {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  margin-top: 8px;
}
.pane.collapsed .pane-body,
.pane.collapsed .pane-tabs,
.pane.collapsed .pane-spacer { display: none; }

.pane-body {
  flex: 1;
  overflow: auto;
  padding: 10px 12px 40px;
}

.pane-tabs { display: flex; gap: 2px; }
.pane-tab {
  padding: 4px 10px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  border-radius: 3px;
}
.pane-tab:hover { color: var(--ink); }
.pane-tab.active { color: var(--accent); background: var(--accent-soft); }

/* ───────── Tree ───────── */
.tree-node { position: relative; }
.tree-row {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 2px 4px 2px 2px;
  border-radius: 3px;
  position: relative;
  min-height: 22px;
}
.tree-row:hover { background: var(--paper-2); }
.tree-node.selected > .tree-row { background: var(--selection); box-shadow: inset 2px 0 0 var(--accent); }

.tree-expand {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  color: var(--muted);
  font-size: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tree-expand:hover { color: var(--accent); }
.tree-spacer { width: 14px; flex-shrink: 0; }

.type-pill {
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.type-pill:hover { filter: brightness(0.95); outline: 1px solid var(--hairline-strong); }
.type-object  { background: #e3dccb; color: #5c4a1e; }
.type-array   { background: #dae3d1; color: #3a5028; }
.type-string  { background: #e8dbd1; color: #7a3e1c; }
.type-number  { background: #d4dde8; color: #1e4670; }
.type-boolean { background: #e3d1e0; color: #6a2663; }
.type-null    { background: #d8d3c7; color: #7a7465; font-style: italic; }

.tree-key {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink);
  padding: 0 2px;
  border-radius: 2px;
  outline: none;
  min-width: 2ch;
}
.tree-key[contenteditable="true"]:focus { background: #fff; box-shadow: 0 0 0 1px var(--accent); }
.tree-key.root-label { color: var(--muted); font-style: italic; font-family: var(--serif); }
.tree-key.array-index { color: var(--muted); font-weight: normal; }

.tree-sep { color: var(--muted); font-family: var(--mono); }

.tree-value {
  font-family: var(--mono);
  font-size: 12px;
  padding: 0 3px;
  border-radius: 2px;
  outline: none;
  max-width: 320px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex-shrink: 1;
}
.tree-value[contenteditable="true"]:focus {
  background: #fff;
  box-shadow: 0 0 0 1px var(--accent);
  white-space: normal;
  overflow: visible;
}
.value-string  { color: #7a3e1c; }
.value-string::before { content: "\""; opacity: 0.5; }
.value-string::after  { content: "\""; opacity: 0.5; }
.value-number  { color: #1e4670; }
.value-boolean { color: #6a2663; font-weight: 500; }
.value-null    { color: #7a7465; font-style: italic; }

.tree-summary {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}

.tree-marks {
  display: inline-flex;
  gap: 4px;
  margin-left: 6px;
  flex-shrink: 0;
}
.mark {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  font-family: var(--serif);
  letter-spacing: 0.04em;
  text-transform: lowercase;
  line-height: 1.4;
  border: 1px solid transparent;
}
.mark-role-table { background: #dbe0ec; color: #1e4670; }
.mark-role-list { background: #e1e5d7; color: #3a5028; }
.mark-role-heading { background: #ead7c3; color: #7a3e1c; }
.mark-role-skip { background: #e0d5d3; color: #7a2a20; font-style: italic; }
.mark-split { background: #e5d7e3; color: #6a2663; }
.mark-ann { background: #f0d9c4; color: #b8572a; font-family: var(--mono); font-size: 11px; padding: 0 5px; }

.tree-actions {
  margin-left: auto;
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity 80ms;
  flex-shrink: 0;
}
.tree-row:hover .tree-actions { opacity: 1; }
.tree-action {
  width: 18px;
  height: 18px;
  border-radius: 3px;
  color: var(--muted);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tree-action:hover { background: var(--paper-2); color: var(--ink); }
.tree-action.delete:hover { background: #f5d9d3; color: var(--danger); }

.tree-children { margin-left: 16px; border-left: 1px dashed var(--hairline); padding-left: 4px; }

.tree-add {
  margin: 2px 0 2px 6px;
  padding: 2px 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  border-radius: 3px;
  border: 1px dashed var(--hairline);
}
.tree-add:hover { color: var(--accent); border-color: var(--accent); border-style: solid; }

/* Type menu */
.type-menu {
  position: fixed;
  background: var(--paper);
  border: 1px solid var(--hairline-strong);
  border-radius: 4px;
  box-shadow: var(--shadow);
  padding: 4px;
  z-index: 1000;
  min-width: 120px;
}
.type-menu button {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 5px 8px;
  border-radius: 3px;
  font-size: 12px;
  text-align: left;
}
.type-menu button:hover { background: var(--paper-2); }

/* ───────── Output ───────── */
.output-view {
  max-width: 780px;
  margin: 0 auto;
  padding: 18px 24px;
}
.output-view.raw { font-family: var(--mono); font-size: 12px; white-space: pre-wrap; max-width: 100%; }
.output-view h1, .output-view h2, .output-view h3, .output-view h4, .output-view h5, .output-view h6 {
  font-family: var(--serif);
  font-weight: 600;
  margin-top: 1.5em;
  margin-bottom: 0.5em;
  line-height: 1.2;
  color: var(--ink);
}
.output-view h1 { font-size: 28px; border-bottom: 1px solid var(--hairline); padding-bottom: 0.25em; margin-top: 0; }
.output-view h2 { font-size: 22px; }
.output-view h3 { font-size: 17px; }
.output-view h4 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.output-view p { margin: 0.6em 0; }
.output-view strong { font-weight: 600; }
.output-view em { font-style: italic; }
.output-view ul, .output-view ol { margin: 0.6em 0; padding-left: 1.6em; }
.output-view li { margin: 0.15em 0; }
.output-view code {
  font-family: var(--mono);
  font-size: 0.9em;
  background: var(--paper-2);
  padding: 1px 5px;
  border-radius: 3px;
}
.output-view table { border-collapse: collapse; margin: 1em 0; font-size: 12px; }
.output-view th, .output-view td { border: 1px solid var(--hairline); padding: 5px 9px; text-align: left; }
.output-view th { background: var(--paper-2); font-weight: 600; }
.output-view hr { border: 0; border-top: 1px solid var(--hairline); margin: 2em 0; }

.output-view.multi { max-width: 820px; padding: 18px 24px; }
.file-banner {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin: 28px 0 6px;
  padding: 10px 14px;
  background: var(--paper-2);
  border-left: 3px solid var(--accent);
  border-radius: 0 3px 3px 0;
  font-family: var(--mono);
  font-size: 12px;
}
.file-banner:first-child { margin-top: 4px; }
.file-banner .file-ix {
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.05em;
}
.file-banner .file-name {
  flex: 1;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.file-banner .file-size {
  color: var(--muted);
  font-size: 11px;
}
.file-block {
  padding: 0 8px 16px;
  border-bottom: 1px dashed var(--hairline);
}
.file-block:last-child { border-bottom: 0; }

.split-plan { padding: 18px 24px; }
.split-plan h3 { font-family: var(--serif); font-size: 15px; margin: 0 0 10px; }
.file-list { font-family: var(--mono); font-size: 12px; }
.file-list-item {
  padding: 6px 10px;
  border-bottom: 1px solid var(--hairline);
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
.file-list-item .size { color: var(--muted); font-size: 11px; }

/* ───────── Inspector ───────── */
.insp-section { margin-bottom: 22px; }
.insp-section h3 {
  font-family: var(--serif);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 500;
  color: var(--muted);
  margin: 0 0 10px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--hairline);
}
.insp-row { margin-bottom: 10px; }
.insp-row label {
  display: block;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 3px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.insp-path {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--paper-2);
  padding: 4px 8px;
  border-radius: 3px;
  color: var(--ink-2);
  word-break: break-all;
}
.insp-shape {
  font-size: 11px;
  color: var(--muted);
  font-style: italic;
  margin-top: 4px;
}

.insp-radio {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.insp-radio label {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 4px 7px;
  border-radius: 3px;
  font-size: 12px;
  color: var(--ink);
  text-transform: none;
  letter-spacing: 0;
  cursor: pointer;
  margin: 0;
}
.insp-radio label:hover { background: var(--paper-2); }
.insp-radio input[type="radio"] { accent-color: var(--accent); }

.insp-checkboxes {
  display: flex;
  flex-direction: column;
  gap: 3px;
  max-height: 200px;
  overflow-y: auto;
  border: 1px solid var(--hairline);
  border-radius: 3px;
  padding: 6px;
  background: var(--paper-2);
}
.insp-check {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 2px 4px;
  font-family: var(--mono);
  font-size: 11px;
  border-radius: 2px;
}
.insp-check:hover { background: var(--paper); }
.insp-check input[type="checkbox"] { accent-color: var(--accent); }
.insp-check .join-input {
  margin-left: auto;
  width: 60px;
  font-size: 10px;
  padding: 1px 4px;
  border: 1px solid var(--hairline);
  border-radius: 2px;
  background: var(--paper);
}

.insp-input, .insp-select {
  width: 100%;
  padding: 5px 8px;
  border: 1px solid var(--hairline);
  border-radius: 3px;
  background: var(--paper-2);
  font-size: 12px;
  font-family: var(--mono);
}
.insp-input:focus, .insp-select:focus { outline: none; border-color: var(--accent); background: var(--paper); }

.insp-input::placeholder,
.insp-textarea::placeholder,
textarea.insp-input::placeholder {
  color: var(--hairline-strong);
  opacity: 0.55;
  font-style: italic;
}

textarea.insp-input, .insp-textarea {
  resize: vertical;
  min-height: 60px;
  line-height: 1.45;
  white-space: pre;
  overflow: auto;
}

.insp-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
}
.insp-toggle input[type="checkbox"] { accent-color: var(--accent); }

.insp-help {
  font-size: 11px;
  color: var(--muted);
  font-style: italic;
  margin-top: 4px;
  line-height: 1.4;
}

.insp-tokens {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  margin-top: 6px;
  line-height: 1.6;
}
.insp-tokens code {
  background: var(--paper-2);
  padding: 1px 4px;
  border-radius: 2px;
  color: var(--accent);
}

.insp-placeholder {
  color: var(--muted);
  font-style: italic;
  text-align: center;
  padding: 40px 20px;
  font-family: var(--serif);
}

.insp-btn {
  padding: 5px 11px;
  border: 1px solid var(--hairline);
  border-radius: 3px;
  font-size: 11px;
  color: var(--ink-2);
  background: var(--paper);
}
.insp-btn:hover { background: var(--paper-2); border-color: var(--hairline-strong); color: var(--ink); }
.insp-btn.primary { border-color: var(--accent); color: var(--accent); }
.insp-btn.primary:hover { background: var(--accent-soft); }

/* ───────── Statusbar ───────── */
.statusbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 6px 14px;
  border-top: 1px solid var(--hairline);
  background: var(--paper);
  font-size: 11px;
  color: var(--muted);
  min-height: 30px;
}
.statusbar .dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ok);
  margin-right: 5px;
  vertical-align: middle;
}
.statusbar .dot.saving { background: var(--accent); animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.status-spacer { flex: 1; }
.status-btn {
  padding: 3px 8px;
  border-radius: 3px;
  color: var(--muted);
}
.status-btn:hover:not(:disabled) { background: var(--paper-2); color: var(--ink); }
.status-btn:disabled { opacity: 0.3; cursor: default; }

/* ───────── Toast / banner ───────── */
.banner {
  position: fixed;
  top: 55px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--paper);
  border: 1px solid var(--hairline-strong);
  border-radius: 4px;
  box-shadow: var(--shadow);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 500;
  font-size: 12px;
  max-width: 520px;
}
.banner.accent { border-color: var(--accent); }

/* Modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(26, 26, 26, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 900;
}
.modal {
  background: var(--paper);
  border: 1px solid var(--hairline-strong);
  border-radius: 6px;
  box-shadow: var(--shadow);
  padding: 20px 24px;
  min-width: 420px;
  max-width: 560px;
  max-height: 80vh;
  overflow: auto;
}
.modal h2 {
  font-family: var(--serif);
  font-size: 18px;
  margin: 0 0 14px;
  font-weight: 500;
}
.modal a { color: var(--accent); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
.modal a:hover { color: var(--ink); }
.version-tag {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  font-weight: normal;
  letter-spacing: 0.03em;
  margin-left: 6px;
}
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

.preset-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border: 1px solid var(--hairline);
  border-radius: 4px;

}
.preset-name {
  flex: 1;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Scrollbars */
.pane-body::-webkit-scrollbar,
.insp-checkboxes::-webkit-scrollbar { width: 8px; height: 8px; }
.pane-body::-webkit-scrollbar-thumb,
.insp-checkboxes::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 4px; }
.pane-body::-webkit-scrollbar-thumb:hover { background: var(--hairline-strong); }
.pane-body::-webkit-scrollbar-track { background: transparent; }

/* Keyboard-style hints */
kbd {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  background: var(--paper-2);
  border: 1px solid var(--hairline);
  border-radius: 3px;
  padding: 1px 5px;
  color: var(--ink-2);
}
</style>

<!-- External libs, soft-failing -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" onerror="window.__XLSX_MISSING=true"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" onerror="window.__JSZIP_MISSING=true"></script>

<script>
"use strict";

/* ══════════════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════════════ */
const state = {
  doc: { title: "New document", sections: [] },
  docName: null, // filename (without extension) of the currently loaded JSON, if any
  rules: {},   // patternPath -> rule object
  splits: {},  // patternPath -> split object
  annotations: {}, // patternPath -> { before, after }
  docFrontMatter: "", // document-wide front matter (applied to main file / index.md)
  selection: null, // null = nothing selected; [] = root selected; [...] = deeper path
  expanded: new Set(["[]"]), // JSON-encoded paths that are expanded
  outputTab: "preview",
  inspectorTab: "rule",
  panes: { tree: { w: 320, collapsed: false }, insp: { w: 340, collapsed: false } },
  preset: null,
  history: { past: [], future: [] },
  lastSaved: null,
  dirty: false,
};

const VERSION = "v0.5.05";
const DEFAULT_TEMPLATE = "{i:02}-{.name}.md";
const MAX_HISTORY = 50;
const AUTOSAVE_DEBOUNCE = 800;

function debounced(fn, ms) {
  let t = null;
  return function(...args) {
    clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

/* ══════════════════════════════════════════════════════════════
   PATH UTILITIES
   ══════════════════════════════════════════════════════════════ */
function pathKey(path) { return JSON.stringify(path); }

function patternPath(path) {
  // Normalize: array indices become '*'
  return path.map(p => typeof p === "number" ? "*" : p).join(".") || "$";
}

function getAt(obj, path) {
  let cur = obj;
  for (const p of path) {
    if (cur == null || typeof cur !== "object") return undefined;
    cur = cur[p];
  }
  return cur;
}

function setAt(obj, path, value) {
  if (path.length === 0) return value;
  const [head, ...rest] = path;
  const isArr = Array.isArray(obj);
  const copy = isArr ? [...obj] : { ...obj };
  copy[head] = rest.length === 0 ? value : setAt(obj[head], rest, value);
  return copy;
}

function deleteAt(obj, path) {
  if (path.length === 0) return undefined;
  if (path.length === 1) {
    if (Array.isArray(obj)) return obj.filter((_, i) => i !== path[0]);
    const { [path[0]]: _, ...rest } = obj;
    return rest;
  }
  const [head, ...rest] = path;
  return setAt(obj, [head], deleteAt(obj[head], rest));
}

function renameKeyAt(obj, parentPath, oldKey, newKey) {
  if (oldKey === newKey) return obj;
  const parent = parentPath.length === 0 ? obj : getAt(obj, parentPath);
  if (!parent || typeof parent !== "object" || Array.isArray(parent)) return obj;
  // Rebuild preserving order
  const rebuilt = {};
  for (const k of Object.keys(parent)) {
    rebuilt[k === oldKey ? newKey : k] = parent[k];
  }
  return parentPath.length === 0 ? rebuilt : setAt(obj, parentPath, rebuilt);
}

function typeOf(v) {
  if (v === null) return "null";
  if (Array.isArray(v)) return "array";
  return typeof v;
}

function defaultValueFor(type) {
  switch (type) {
    case "object": return {};
    case "array": return [];
    case "string": return "";
    case "number": return 0;
    case "boolean": return false;
    case "null": return null;
    default: return "";
  }
}

function coerceTo(value, type) {
  const from = typeOf(value);
  if (from === type) return value;
  if (type === "string") return value == null ? "" : String(value);
  if (type === "number") { const n = Number(value); return Number.isFinite(n) ? n : 0; }
  if (type === "boolean") {
    if (typeof value === "string") return value.toLowerCase() === "true" || value === "1";
    return !!value;
  }
  if (type === "null") return null;
  if (type === "array") return from === "object" ? Object.values(value) : [value];
  if (type === "object") {
    if (from === "array") return Object.assign({}, value);
    return {};
  }
  return defaultValueFor(type);
}

function formatValuePreview(v) {
  const t = typeOf(v);
  if (t === "null") return "null";
  if (t === "string") return v;
  if (t === "number" || t === "boolean") return String(v);
  if (t === "array") return `[${v.length}]`;
  if (t === "object") return `{${Object.keys(v).length}}`;
  return String(v);
}

function subtreeHasNumbers(v, depth = 0) {
  if (depth > 4) return false;
  if (typeof v === "number") return true;
  if (Array.isArray(v)) return v.some(x => subtreeHasNumbers(x, depth + 1));
  if (v && typeof v === "object") return Object.values(v).some(x => subtreeHasNumbers(x, depth + 1));
  return false;
}

function parseScalar(text, originalType) {
  // Preserve the type when editing a leaf value; allow type coercion if the text clearly indicates
  if (originalType === "number") {
    const n = Number(text);
    return Number.isFinite(n) ? n : 0;
  }
  if (originalType === "boolean") {
    const s = text.toLowerCase().trim();
    return s === "true" || s === "1";
  }
  return text;
}

/* ══════════════════════════════════════════════════════════════
   HISTORY
   ══════════════════════════════════════════════════════════════ */
function snapshot() {
  return { doc: state.doc, rules: { ...state.rules }, splits: { ...state.splits }, annotations: { ...state.annotations }, docFrontMatter: state.docFrontMatter };
}

function pushHistory() {
  state.history.past.push(snapshot());
  if (state.history.past.length > MAX_HISTORY) state.history.past.shift();
  state.history.future = [];
  updateUndoButtons();
}

function undo() {
  if (!state.history.past.length) return;
  const current = snapshot();
  const prev = state.history.past.pop();
  state.history.future.push(current);
  state.doc = prev.doc; state.rules = prev.rules; state.splits = prev.splits;
  state.annotations = prev.annotations || {};
  state.docFrontMatter = prev.docFrontMatter || "";
  updateAll();
}

function redo() {
  if (!state.history.future.length) return;
  const current = snapshot();
  const next = state.history.future.pop();
  state.history.past.push(current);
  state.doc = next.doc; state.rules = next.rules; state.splits = next.splits;
  state.annotations = next.annotations || {};
  state.docFrontMatter = next.docFrontMatter || "";
  updateAll();
}

function updateUndoButtons() {
  const canUndo = !!state.history.past.length;
  const canRedo = !!state.history.future.length;
  for (const id of ["btn-undo", "btn-undo-tb"]) {
    const el = document.getElementById(id); if (el) el.disabled = !canUndo;
  }
  for (const id of ["btn-redo", "btn-redo-tb"]) {
    const el = document.getElementById(id); if (el) el.disabled = !canRedo;
  }
}

/* ══════════════════════════════════════════════════════════════
   RULES — defaults, access, inference
   ══════════════════════════════════════════════════════════════ */
function defaultRule() {
  return {
    role: "auto",           // auto | heading | table | list | skip
    headingFrom: "key",     // key | .fieldName
    headingLevel: "auto",   // auto | 1..6
    labelFormat: "titleCase", // asIs | titleCase
    keyStyle: "bold",       // plain | bold | italic | boldItalic
    valueStyle: "plain",    // plain | bold | italic | boldItalic
    tableMode: "kv",        // kv | rows (for objects rendered as tables)
    decimalMark: ".",       // "." | "," — thousand-separator style for numbers
    columns: null,          // null = all primitive fields; [".name",...]
    joins: {},              // { ".tags": ", " }
  };
}

function getRule(path) {
  const p = patternPath(path);
  return state.rules[p] || null;
}

/** For arrays: check array's own pattern, then fall back to items' pattern
    (so a rule set by clicking an item inside the array also applies). */
function getArrayRule(path) {
  const own = state.rules[patternPath(path)];
  if (own) return own;
  const items = state.rules[patternPath([...path, 0])];
  if (items) return items;
  return null;
}

function setRule(path, partial) {
  pushHistory();
  const p = patternPath(path);
  const existing = state.rules[p] || defaultRule();
  state.rules[p] = { ...existing, ...partial };
  afterChange();
}

function clearRule(path) {
  pushHistory();
  delete state.rules[patternPath(path)];
  afterChange();
}

/* ══════════════════════════════════════════════════════════════
   SPLIT
   ══════════════════════════════════════════════════════════════ */
function defaultSplit() {
  return {
    enabled: false,
    template: DEFAULT_TEMPLATE,
    slug: { lowercase: true, dashes: true, stripAccents: true, maxLength: 60 },
    frontMatter: "",        // inserted at the top of every split file; supports annotation tokens
  };
}

function getSplit(path) {
  return state.splits[patternPath(path)] || null;
}

function setSplit(path, partial) {
  pushHistory();
  const p = patternPath(path);
  const existing = state.splits[p] || defaultSplit();
  const next = { ...existing, ...partial, slug: { ...existing.slug, ...(partial.slug || {}) } };
  if (!next.enabled && !partial.enabled) {
    // Keep template/slug for toggle-back
  }
  state.splits[p] = next;
  afterChange();
}

/* ══════════════════════════════════════════════════════════════
   ANNOTATIONS — free-form text before/after a node
   ══════════════════════════════════════════════════════════════ */
function getAnnotation(path) {
  return state.annotations[patternPath(path)] || null;
}

function setAnnotation(path, partial) {
  pushHistory();
  const p = patternPath(path);
  const existing = state.annotations[p] || { before: "", after: "" };
  const next = { ...existing, ...partial };
  if (!next.before && !next.after) {
    delete state.annotations[p];
  } else {
    state.annotations[p] = next;
  }
  afterChange();
}

/* ══════════════════════════════════════════════════════════════
   MARKDOWN STYLING HELPERS
   ══════════════════════════════════════════════════════════════ */
function styleMD(text, style) {
  if (text === null || text === undefined || text === "") return "";
  const s = String(text);
  switch (style) {
    case "bold": return `**${s}**`;
    case "italic": return `*${s}*`;
    case "boldItalic": return `***${s}***`;
    default: return s;
  }
}

function formatNumber(n, rule) {
  if (typeof n !== "number" || !Number.isFinite(n)) return String(n);
  const s = String(n);
  if (rule && rule.decimalMark === ",") return s.replace(".", ",");
  return s;
}

/** Resolve {.field}, {parent.field}, {$.field} / {doc.field} tokens against nodes. */
function resolveAnnotationTokens(text, node, parent) {
  if (!text) return "";
  return text.replace(/\{([^}\s]+)\}/g, (_, token) => {
    if (token === "$" || token === "doc") return "";
    if (token.startsWith("$.") || token.startsWith("doc.")) {
      const rest = token.replace(/^(\$|doc)\./, "").split(".").filter(Boolean);
      const v = getAt(state.doc, rest);
      return v == null ? "" : String(v);
    }
    if (token.startsWith("parent.")) {
      const rest = token.slice(7).split(".").filter(Boolean);
      const v = getAt(parent, rest);
      return v == null ? "" : String(v);
    }
    if (token.startsWith(".")) {
      const rest = token.slice(1).split(".").filter(Boolean);
      const v = getAt(node, rest);
      return v == null ? "" : String(v);
    }
    return `{${token}}`;
  });
}

/** Wrap a rendered string with before/after annotations at `path`.
 *  No auto blank lines: we insert each annotation verbatim, only adding a
 *  single `\n` separator if one isn't already present between annotation and body. */
function wrapWithAnnotations(body, path) {
  const ann = getAnnotation(path);
  if (!ann || (!ann.before && !ann.after)) return body;
  const node = path.length === 0 ? state.doc : getAt(state.doc, path);
  const parent = path.length === 0 ? null : (path.length === 1 ? state.doc : getAt(state.doc, path.slice(0, -1)));
  let out = body;
  if (ann.before) {
    const b = resolveAnnotationTokens(ann.before, node, parent);
    const sep = b.endsWith("\n") ? "" : "\n";
    out = b + sep + out;
  }
  if (ann.after) {
    const a = resolveAnnotationTokens(ann.after, node, parent);
    const sep = out.endsWith("\n") ? "" : "\n";
    out = out + sep + a + (a.endsWith("\n") ? "" : "\n");
  }
  return out;
}

/* ══════════════════════════════════════════════════════════════
   SLUGIFY & FILENAME TEMPLATES
   ══════════════════════════════════════════════════════════════ */
function stripAccents(s) {
  return s.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function slugify(text, opts) {
  let s = String(text ?? "");
  if (opts.stripAccents) s = stripAccents(s);
  if (opts.lowercase) s = s.toLowerCase();
  if (opts.dashes) s = s.replace(/\s+/g, "-").replace(/[^\w\-.]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
  if (opts.maxLength && s.length > opts.maxLength) s = s.slice(0, opts.maxLength).replace(/-+$/,"");
  return s || "item";
}

function resolveTemplate(template, child, index, parentArr, parent) {
  // tokens: {i}, {i:02}, {key}, {.path.to.field}, {parent.x}
  return template.replace(/\{([^}]+)\}/g, (_, token) => {
    // {i} or {i:02}
    const m = token.match(/^i(?::(\d+))?$/);
    if (m) {
      const pad = m[1] ? parseInt(m[1]) : 0;
      return String(index + 1).padStart(pad, "0");
    }
    if (token === "key") return String(index);
    if (token.startsWith("parent.")) {
      const rest = token.slice(7).split(".").filter(Boolean);
      return String(getAt(parent, rest) ?? "");
    }
    if (token.startsWith(".")) {
      const rest = token.slice(1).split(".").filter(Boolean);
      return String(getAt(child, rest) ?? "");
    }
    return "";
  });
}

function applySlug(filename, slugOpts) {
  // Only slugify the path-part segments (preserve extension)
  const m = filename.match(/^(.*?)(\.[^./]+)?$/);
  const body = m[1], ext = m[2] || "";
  // Split by / so path segments keep structure (rare, but allowed)
  const parts = body.split("/").map(p => slugify(p, slugOpts));
  return parts.join("/") + ext;
}

/* ══════════════════════════════════════════════════════════════
   MARKDOWN GENERATION
   ══════════════════════════════════════════════════════════════ */
function humanize(s) {
  return String(s)
    .replace(/[_-]+/g, " ")
    .replace(/([a-z])([A-Z])/g, "$1 $2")
    .replace(/\s+/g, " ")
    .trim()
    .replace(/^./, c => c.toUpperCase());
}

function formatLabel(key, fmt) {
  if (fmt === "asIs") return String(key);
  return humanize(key);
}

function escapeMdCell(s) {
  return String(s).replace(/\|/g, "\\|").replace(/\n/g, " ");
}

function mdInline(value, join = ", ", rule) {
  const t = typeOf(value);
  if (t === "null" || value === undefined) return "";
  if (t === "string") return value;
  if (t === "number") return formatNumber(value, rule);
  if (t === "boolean") return String(value);
  if (t === "array") return value.map(v => mdInline(v, join, rule)).join(join);
  if (t === "object") return Object.entries(value).map(([k,v]) => `${k}: ${mdInline(v,join,rule)}`).join(join);
  return String(value);
}

function inferColumns(arr) {
  // Return list of field paths (strings like ".foo" or ".bar.baz") present in most items
  if (!Array.isArray(arr) || arr.length === 0) return [];
  const cols = new Map(); // name -> count
  for (const item of arr) {
    if (item && typeof item === "object" && !Array.isArray(item)) {
      for (const k of Object.keys(item)) {
        cols.set("." + k, (cols.get("." + k) || 0) + 1);
      }
    }
  }
  return [...cols.keys()];
}

function renderMD(value, path, ctx) {
  return wrapWithAnnotations(_renderMDBody(value, path, ctx), path);
}

function _renderMDBody(value, path, ctx) {
  const t = typeOf(value);
  const rule = (t === "array" ? getArrayRule(path) : getRule(path)) || defaultRule();
  const out = [];

  // Primitive
  if (t === "string" || t === "number" || t === "boolean" || t === "null") {
    const keyLabel = path.length === 0 ? null : formatLabel(path[path.length - 1], rule.labelFormat);
    if (rule.role === "skip") return "";
    let valStr;
    if (t === "string") valStr = value;
    else if (t === "null") valStr = "—";
    else if (t === "number") valStr = formatNumber(value, rule);
    else valStr = String(value);
    const kStyle = rule.keyStyle || "bold";
    const vStyle = rule.valueStyle || "plain";
    if (keyLabel) return `${styleMD(keyLabel, kStyle)}: ${styleMD(valStr, vStyle)}\n\n`;
    return styleMD(valStr, vStyle) + "\n\n";
  }

  // Array
  if (t === "array") {
    if (rule.role === "skip") return "";

    // Table role (or auto-detect homogeneous object array)
    const isObjArray = value.length > 0 && value.every(v => v && typeof v === "object" && !Array.isArray(v));
    let role = rule.role;
    if (role === "auto") {
      role = "heading"; // each item as a sub-section by default
    }

    if (role === "table" && isObjArray) {
      const cols = rule.columns && rule.columns.length ? rule.columns : inferColumns(value);
      const headers = cols.map(c => formatLabel(c.replace(/^\./, "").split(".").pop(), rule.labelFormat));
      out.push("| " + headers.join(" | ") + " |\n");
      out.push("|" + headers.map(() => "---").join("|") + "|\n");
      for (const item of value) {
        const row = cols.map(col => {
          const subpath = col.replace(/^\./, "").split(".").filter(Boolean);
          const v = getAt(item, subpath);
          const join = rule.joins?.[col] ?? ", ";
          return escapeMdCell(mdInline(v, join, rule));
        });
        out.push("| " + row.join(" | ") + " |\n");
      }
      out.push("\n");
      return out.join("");
    }

    if (role === "list") {
      for (const item of value) {
        const s = typeOf(item) === "object" ? mdInline(item) : mdInline(item);
        out.push(`- ${s}\n`);
      }
      out.push("\n");
      return out.join("");
    }

    // heading role: each child under its own sub-heading.
    // If all items are primitives AND parent is an object (not array), emit a label first.
    const allPrimitive = value.length > 0 && value.every(v => typeOf(v) !== "object" && typeOf(v) !== "array");
    const parentKey = path[path.length - 1];
    if (allPrimitive && typeof parentKey === "string") {
      const kStyle = rule.keyStyle || "bold";
      out.push(`${styleMD(formatLabel(parentKey, rule.labelFormat), kStyle)}:\n\n`);
    }
    value.forEach((item, i) => {
      const childPath = [...path, i];
      const itemType = typeOf(item);
      if (itemType === "object") {
        const childRule = getRule(childPath) || rule;
        const hr = getHeadingText(item, i, childRule, path.length === 0 ? "Item" : path[path.length - 1]);
        const level = Math.min(6, ctx.level);
        out.push("#".repeat(level) + " " + hr.text + "\n\n");
        out.push(renderMD(item, childPath, { ...ctx, level: ctx.level + 1, suppressHeading: true, autoHeadingKey: hr.usedKey }));
      } else if (itemType === "array") {
        // Array of arrays — emit a sub-heading and recurse so nested rules still apply.
        const fallbackKey = path.length === 0 ? "Item" : String(path[path.length - 1]);
        const label = formatLabel(fallbackKey, rule.labelFormat) + " " + (i + 1);
        const level = Math.min(6, ctx.level);
        out.push("#".repeat(level) + " " + label + "\n\n");
        out.push(renderMD(item, childPath, { ...ctx, level: ctx.level + 1, suppressHeading: true }));
      } else {
        const itemStr = typeOf(item) === "number" ? formatNumber(item, rule) : mdInline(item, ", ", rule);
        out.push(wrapWithAnnotations(`- ${itemStr}\n`, childPath));
      }
    });
    if (value.some(v => typeOf(v) !== "object" && typeOf(v) !== "array")) out.push("\n");
    return out.join("");
  }

  // Object
  if (t === "object") {
    if (rule.role === "skip") return "";

    let autoHeadingKey = ctx.autoHeadingKey || null; // from parent array iteration
    // Emit heading for this object if it's not root and not suppressed
    if (path.length > 0 && !ctx.suppressHeading) {
      const hr = getHeadingText(value, null, rule, path[path.length - 1]);
      const level = Math.min(6, ctx.level);
      out.push("#".repeat(level) + " " + hr.text + "\n\n");
      autoHeadingKey = hr.usedKey;
      ctx = { ...ctx, level: ctx.level + 1 };
    } else if (path.length === 0) {
      // Root: emit doc title if present
      if (typeof value.title === "string" && value.title) {
        out.push("# " + value.title + "\n\n");
        autoHeadingKey = "title";
        ctx = { ...ctx, level: 2 };
      } else if (typeof value.name === "string" && value.name) {
        out.push("# " + value.name + "\n\n");
        autoHeadingKey = "name";
        ctx = { ...ctx, level: 2 };
      }
    }

    // Object → table
    if (rule.role === "table") {
      const entries = Object.entries(value).filter(([k]) => k !== autoHeadingKey);
      const mode = rule.tableMode || "kv";
      const allObj = entries.length > 0 && entries.every(([, v]) => v && typeof v === "object" && !Array.isArray(v));

      if (mode === "rows" && allObj) {
        // Child objects as rows. First column = outer key; other columns from child fields.
        const cols = rule.columns && rule.columns.length ? rule.columns : inferColumns(entries.map(e => e[1]));
        const headers = ["Name", ...cols.map(c => formatLabel(c.replace(/^\./, "").split(".").pop(), rule.labelFormat))];
        out.push("| " + headers.join(" | ") + " |\n");
        out.push("|" + headers.map(() => "---").join("|") + "|\n");
        for (const [k, v] of entries) {
          const row = [formatLabel(k, rule.labelFormat), ...cols.map(col => {
            const subpath = col.replace(/^\./, "").split(".").filter(Boolean);
            const val = getAt(v, subpath);
            const join = rule.joins?.[col] ?? ", ";
            return mdInline(val, join, rule);
          })];
          out.push("| " + row.map(escapeMdCell).join(" | ") + " |\n");
        }
      } else {
        // Key/Value pairs
        out.push("| Field | Value |\n|---|---|\n");
        for (const [k, v] of entries) {
          const label = formatLabel(k, rule.labelFormat);
          let valStr;
          if (v == null) valStr = "—";
          else if (typeof v === "number") valStr = formatNumber(v, rule);
          else if (typeof v === "object") valStr = mdInline(v, ", ", rule);
          else valStr = String(v);
          out.push(`| ${escapeMdCell(label)} | ${escapeMdCell(valStr)} |\n`);
        }
      }
      out.push("\n");
      return out.join("");
    }

    // Key used as heading source (explicit rule, auto-detect, or passed from parent iteration)
    const headingKey = (rule.headingFrom && rule.headingFrom.startsWith("."))
      ? rule.headingFrom.slice(1).split(".")[0]
      : autoHeadingKey;

    // Render children: leaves first (as formatted "Key: value"), then containers
    const keys = Object.keys(value);
    const leaves = [];
    const containers = [];
    for (const k of keys) {
      if (k === headingKey) continue;
      const v = value[k];
      const ct = typeOf(v);
      if (ct === "object" || ct === "array") containers.push(k);
      else leaves.push(k);
    }
    for (const k of leaves) {
      const childPath = [...path, k];
      const childRule = getRule(childPath) || null;
      if (childRule && childRule.role === "skip") continue;
      const label = formatLabel(k, rule.labelFormat);
      const v = value[k];
      const vt = typeOf(v);
      const effRule = childRule || rule;
      let vs;
      if (vt === "string") vs = v;
      else if (vt === "null") vs = "—";
      else if (vt === "number") vs = formatNumber(v, effRule);
      else vs = String(v);
      const kStyle = (childRule && childRule.keyStyle) || rule.keyStyle || "bold";
      const vStyle = (childRule && childRule.valueStyle) || rule.valueStyle || "plain";
      const leafLine = `${styleMD(label, kStyle)}: ${styleMD(vs, vStyle)}\n\n`;
      out.push(wrapWithAnnotations(leafLine, childPath));
    }
    for (const k of containers) {
      out.push(renderMD(value[k], [...path, k], { ...ctx, suppressHeading: false, autoHeadingKey: null }));
    }
    return out.join("");
  }

  return "";
}

function getHeadingText(item, index, rule, fallbackKey) {
  if (rule.headingFrom && rule.headingFrom.startsWith(".")) {
    const sub = rule.headingFrom.slice(1).split(".").filter(Boolean);
    const v = getAt(item, sub);
    if (v != null && v !== "") return { text: String(v), usedKey: sub[0] };
  }
  if (typeof item === "object" && item !== null && !Array.isArray(item)) {
    if (typeof item.title === "string" && item.title) return { text: item.title, usedKey: "title" };
    if (typeof item.name === "string" && item.name) return { text: item.name, usedKey: "name" };
  }
  const text = index != null
    ? formatLabel(fallbackKey || "item", rule.labelFormat) + " " + (index + 1)
    : formatLabel(fallbackKey || "item", rule.labelFormat);
  return { text, usedKey: null };
}

/* ══════════════════════════════════════════════════════════════
   SPLIT FILE GENERATION
   ══════════════════════════════════════════════════════════════ */
function findActiveSplits() {
  // Return list of { path, pattern, split } for enabled splits
  return Object.entries(state.splits)
    .filter(([, s]) => s.enabled)
    .map(([pattern, split]) => ({ pattern, split }));
}

function findAllPathsForPattern(pattern) {
  // Walk doc; return all paths whose patternPath matches exactly
  const target = pattern;
  const results = [];
  function walk(val, path) {
    if (patternPath(path) === target) results.push(path);
    if (val && typeof val === "object") {
      const entries = Array.isArray(val) ? val.map((v, i) => [i, v]) : Object.entries(val);
      for (const [k, v] of entries) walk(v, [...path, k]);
    }
  }
  walk(state.doc, []);
  return results;
}

function generateFiles() {
  const files = [];
  const activeSplits = findActiveSplits();

  if (activeSplits.length === 0) {
    const md = renderMD(state.doc, [], { level: 1 });
    let content = md.trim() + "\n";
    if (state.docFrontMatter && state.docFrontMatter.trim()) {
      const fm = resolveAnnotationTokens(state.docFrontMatter, state.doc, null);
      content = fm + (fm.endsWith("\n") ? "" : "\n") + content;
    }
    files.push({ name: "document.md", content });
    return files;
  }

  // For simplicity in v0.1: handle one split pattern that targets an array.
  // Behaviour: for each path matching the split pattern, each child becomes a file.
  // The "main" file contains the doc with split arrays replaced by a link list.

  // We'll build a synthetic doc for the main file by replacing split targets with link markers.
  const splitArrays = []; // [{ arrPath, files:[{name, item, index}] }]
  for (const { pattern, split } of activeSplits) {
    const paths = findAllPathsForPattern(pattern);
    for (const arrPath of paths) {
      const arr = getAt(state.doc, arrPath);
      if (!Array.isArray(arr)) continue;
      const parentPath = arrPath.slice(0, -1);
      const parent = parentPath.length === 0 ? state.doc : getAt(state.doc, parentPath);
      const entries = arr.map((item, i) => {
        const raw = resolveTemplate(split.template, item, i, arr, parent);
        const name = applySlug(raw, split.slug);
        return { name, item, index: i };
      });
      // Ensure uniqueness
      const seen = new Map();
      for (const e of entries) {
        const base = e.name.replace(/(\.[^./]+)$/, "");
        const ext = e.name.slice(base.length);
        const c = (seen.get(e.name) || 0) + 1;
        seen.set(e.name, c);
        if (c > 1) e.name = `${base}-${c}${ext}`;
      }
      splitArrays.push({ arrPath, entries });

      // Produce a file per entry
      for (const e of entries) {
        let content = renderMD(e.item, [...arrPath, e.index], { level: 1 }).trim() + "\n";
        if (split.frontMatter && split.frontMatter.trim()) {
          const fm = resolveAnnotationTokens(split.frontMatter, e.item, parent);
          content = fm + (fm.endsWith("\n") ? "" : "\n") + content;
        }
        files.push({ name: e.name, content });
      }
    }
  }

  // Build main file: replace split arrays with link lists in doc, then render
  let stubDoc = state.doc;
  for (const { arrPath, entries } of splitArrays) {
    const linkList = entries.map(e => ({ __link: true, name: e.name, label: getHeadingText(e.item, e.index, defaultRule(), "item").text }));
    stubDoc = setAt(stubDoc, arrPath, linkList);
  }

  // Render stub; intercept __link arrays to render bullets
  const mainMd = renderWithLinks(stubDoc, [], { level: 1 });
  let indexContent = mainMd.trim() + "\n";
  if (state.docFrontMatter && state.docFrontMatter.trim()) {
    const fm = resolveAnnotationTokens(state.docFrontMatter, state.doc, null);
    indexContent = fm + (fm.endsWith("\n") ? "" : "\n") + indexContent;
  }
  files.unshift({ name: "index.md", content: indexContent });

  return files;
}

function renderWithLinks(value, path, ctx) {
  if (Array.isArray(value) && value.every(v => v && v.__link)) {
    return value.map(v => `- [${v.label}](${v.name})`).join("\n") + "\n\n";
  }
  if (value && typeof value === "object") {
    const t = typeOf(value);
    if (t === "array") {
      return value.map((item, i) => renderWithLinks(item, [...path, i], ctx)).join("");
    }
    if (t === "object") {
      // Re-use renderMD but substitute link arrays
      // Easiest: replace nested link arrays with temporary placeholder strings, render, then swap back.
      const placeholders = [];
      function subs(v, p) {
        if (Array.isArray(v) && v.every(x => x && x.__link)) {
          const id = `__LINK_BLOCK_${placeholders.length}__`;
          placeholders.push({ id, links: v });
          return id;
        }
        if (Array.isArray(v)) return v.map((x,i) => subs(x,[...p,i]));
        if (v && typeof v === "object") {
          const out = {};
          for (const k of Object.keys(v)) out[k] = subs(v[k], [...p,k]);
          return out;
        }
        return v;
      }
      const substituted = subs(value, path);
      let md = renderMD(substituted, path, ctx);
      for (const ph of placeholders) {
        const linkMd = ph.links.map(l => `- [${l.label}](${l.name})`).join("\n") + "\n";
        md = md.replace(new RegExp(`\\*\\*[^*]*\\*\\*\\s*${ph.id}`, "g"), linkMd)
               .replace(ph.id, linkMd);
      }
      return md;
    }
  }
  return renderMD(value, path, ctx);
}

/* ══════════════════════════════════════════════════════════════
   XLSX GENERATION
   ══════════════════════════════════════════════════════════════ */
function findTableSources() {
  // Walk doc. Find: (a) arrays with a "table" rule, (b) arrays under a split point.
  const sources = []; // [{ name, rows, columns }]
  const activeSplits = findActiveSplits();

  function walk(val, path) {
    if (Array.isArray(val) && val.length > 0 && val.every(v => v && typeof v === "object" && !Array.isArray(v))) {
      const rule = getRule(path);
      const split = getSplit(path);
      const isTable = rule?.role === "table";
      const isSplit = split?.enabled;

      if (isSplit) {
        // Each item becomes its own sheet containing the item's fields as rows
        const parent = path.length === 0 ? state.doc : getAt(state.doc, path.slice(0, -1));
        val.forEach((item, i) => {
          const name = applySlug(resolveTemplate(split.template, item, i, val, parent).replace(/\.md$/i, ""), split.slug).slice(0, 31);
          // Flatten object into key/value rows
          const rows = Object.entries(item).map(([k, v]) => ({
            Field: humanize(k),
            Value: typeof v === "object" ? JSON.stringify(v) : v,
          }));
          sources.push({ name: name || `Sheet ${i+1}`, rows, columns: ["Field", "Value"] });
        });
        return;
      }

      if (isTable) {
        const cols = rule.columns && rule.columns.length ? rule.columns : inferColumns(val);
        const headers = cols.map(c => formatLabel(c.replace(/^\./, "").split(".").pop(), rule.labelFormat || "titleCase"));
        const rows = val.map(item => {
          const row = {};
          cols.forEach((col, idx) => {
            const subpath = col.replace(/^\./, "").split(".").filter(Boolean);
            const v = getAt(item, subpath);
            const join = rule.joins?.[col] ?? ", ";
            row[headers[idx]] = typeof v === "object" && v !== null ? mdInline(v, join) : v;
          });
          return row;
        });
        const sheetName = (path[path.length - 1] ? humanize(String(path[path.length - 1])) : "Data").slice(0, 31);
        sources.push({ name: sheetName, rows, columns: headers });
        return; // don't recurse into a table
      }
    }
    if (val && typeof val === "object") {
      const entries = Array.isArray(val) ? val.map((v, i) => [i, v]) : Object.entries(val);
      for (const [k, v] of entries) walk(v, [...path, k]);
    }
  }
  walk(state.doc, []);

  // Deduplicate sheet names
  const names = new Map();
  for (const s of sources) {
    const c = (names.get(s.name) || 0) + 1;
    names.set(s.name, c);
    if (c > 1) s.name = (s.name + " " + c).slice(0, 31);
  }
  return sources;
}

function generateXLSXBlob() {
  if (window.__XLSX_MISSING || typeof XLSX === "undefined") return null;
  const sources = findTableSources();
  const wb = XLSX.utils.book_new();
  if (sources.length === 0) {
    // Fallback: flatten doc to two-column sheet
    const rows = [];
    function flatten(val, prefix) {
      if (val && typeof val === "object") {
        const entries = Array.isArray(val) ? val.map((v, i) => [i, v]) : Object.entries(val);
        for (const [k, v] of entries) flatten(v, prefix ? `${prefix}.${k}` : String(k));
      } else {
        rows.push({ Path: prefix, Value: val });
      }
    }
    flatten(state.doc, "");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), "Document");
  } else {
    for (const s of sources) {
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(s.rows), s.name);
    }
  }
  return XLSX.write(wb, { bookType: "xlsx", type: "array" });
}

/* ══════════════════════════════════════════════════════════════
   RENDERING — TREE
   ══════════════════════════════════════════════════════════════ */
function isExpanded(path) { return state.expanded.has(pathKey(path)); }
function toggleExpanded(path) {
  const k = pathKey(path);
  if (state.expanded.has(k)) state.expanded.delete(k);
  else state.expanded.add(k);
  renderTree();
}

function isSelected(path) { return state.selection !== null && pathKey(path) === pathKey(state.selection); }

function renderTree() {
  const root = document.getElementById("tree-body");
  root.innerHTML = "";
  root.appendChild(renderTreeNode(state.doc, []));
}

function typeLabel(t) {
  return { object: "{}", array: "[]", string: "\"\"", number: "#", boolean: "✓", null: "∅" }[t];
}

function buildTreeMarks(path, t, value) {
  const marks = [];
  // Rule
  const rule = t === "array" ? getArrayRule(path) : getRule(path);
  if (rule) {
    const role = rule.role || "auto";
    if (role !== "auto") {
      marks.push({ kind: "role-" + role, label: role, title: `Render as: ${role}` });
    }
  }
  // Split
  const split = getSplit(path);
  if (split && split.enabled) {
    marks.push({ kind: "split", label: "split", title: "Split into files" });
  }
  // Annotation
  const ann = getAnnotation(path);
  if (ann && (ann.before || ann.after)) {
    const parts = [];
    if (ann.before) parts.push("before");
    if (ann.after) parts.push("after");
    marks.push({ kind: "ann", label: "※", title: "Annotation (" + parts.join(" + ") + ")" });
  }
  return marks;
}

function renderTreeNode(value, path) {
  const t = typeOf(value);
  const nodeEl = document.createElement("div");
  nodeEl.className = "tree-node";
  if (isSelected(path)) nodeEl.classList.add("selected");

  const row = document.createElement("div");
  row.className = "tree-row";
  row.dataset.path = pathKey(path);
  row.addEventListener("click", (e) => {
    if (e.target.closest(".tree-expand,.type-pill,.tree-action,.tree-value,.tree-key[contenteditable='true']")) return;
    selectPath(path);
  });

  // Expand arrow
  if (t === "object" || t === "array") {
    const arrow = document.createElement("button");
    arrow.className = "tree-expand";
    arrow.textContent = isExpanded(path) ? "▼" : "▶";
    arrow.addEventListener("click", (e) => { e.stopPropagation(); toggleExpanded(path); });
    row.appendChild(arrow);
  } else {
    const sp = document.createElement("span"); sp.className = "tree-spacer";
    row.appendChild(sp);
  }

  // Type pill
  const pill = document.createElement("button");
  pill.className = "type-pill type-" + t;
  pill.textContent = typeLabel(t);
  pill.title = "Change type";
  pill.addEventListener("click", (e) => { e.stopPropagation(); showTypeMenu(e.currentTarget, path); });
  row.appendChild(pill);

  // Key
  const keyEl = document.createElement("span");
  keyEl.className = "tree-key";
  const parentPath = path.slice(0, -1);
  const parent = parentPath.length === 0 ? state.doc : getAt(state.doc, parentPath);
  const isArrayChild = Array.isArray(parent);
  if (path.length === 0) {
    keyEl.classList.add("root-label");
    keyEl.textContent = "root";
  } else if (isArrayChild) {
    keyEl.classList.add("array-index");
    keyEl.textContent = `[${path[path.length - 1]}]`;
  } else {
    keyEl.textContent = String(path[path.length - 1]);
    keyEl.contentEditable = "true";
    keyEl.spellcheck = false;
    keyEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); keyEl.blur(); }
      if (e.key === "Escape") { keyEl.textContent = String(path[path.length - 1]); keyEl.blur(); }
    });
    keyEl.addEventListener("blur", () => {
      const newKey = keyEl.textContent.trim();
      if (!newKey || newKey === path[path.length - 1]) { keyEl.textContent = String(path[path.length - 1]); return; }
      const parentKeys = parent && typeof parent === "object" ? Object.keys(parent) : [];
      if (parentKeys.includes(newKey)) { keyEl.textContent = String(path[path.length - 1]); flashStatus("Key already exists", true); return; }
      pushHistory();
      state.doc = renameKeyAt(state.doc, parentPath, path[path.length - 1], newKey);
      afterChange();
    });
  }
  row.appendChild(keyEl);

  // Value or summary
  if (t === "object" || t === "array") {
    const summary = document.createElement("span");
    summary.className = "tree-summary";
    summary.textContent = t === "object"
      ? `{} ${Object.keys(value).length}`
      : `[] ${value.length}`;
    row.appendChild(summary);
  } else {
    const sep = document.createElement("span"); sep.className = "tree-sep"; sep.textContent = ":";
    row.appendChild(sep);
    const valEl = document.createElement("span");
    valEl.className = "tree-value value-" + t;
    valEl.textContent = formatValuePreview(value);
    if (t !== "null") {
      valEl.contentEditable = "true";
      valEl.spellcheck = false;
    }
    valEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); valEl.blur(); }
      if (e.key === "Escape") { valEl.textContent = formatValuePreview(value); valEl.blur(); }
    });
    valEl.addEventListener("blur", () => {
      const txt = valEl.textContent;
      const newVal = parseScalar(txt, t);
      if (newVal === value) return;
      pushHistory();
      state.doc = setAt(state.doc, path, newVal);
      afterChange();
    });
    row.appendChild(valEl);
  }

  // Rule / split / annotation markers
  const marks = buildTreeMarks(path, t, value);
  if (marks.length) {
    const wrap = document.createElement("span");
    wrap.className = "tree-marks";
    for (const m of marks) {
      const chip = document.createElement("span");
      chip.className = "mark mark-" + m.kind;
      chip.textContent = m.label;
      chip.title = m.title;
      wrap.appendChild(chip);
    }
    row.appendChild(wrap);
  }

  // Actions
  const actions = document.createElement("span"); actions.className = "tree-actions";
  if (path.length > 0) {
    const del = document.createElement("button");
    del.className = "tree-action delete";
    del.innerHTML = "×";
    del.title = "Delete";
    del.addEventListener("click", (e) => {
      e.stopPropagation();
      const v = getAt(state.doc, path);
      const nonEmpty = v && typeof v === "object" &&
        ((Array.isArray(v) && v.length > 0) || (!Array.isArray(v) && Object.keys(v).length > 0));
      const keyLabel = Array.isArray(getAt(state.doc, path.slice(0, -1))) ? `[${path[path.length-1]}]` : String(path[path.length-1]);
      if (nonEmpty && !confirm(`Delete ${keyLabel}? It contains ${Array.isArray(v) ? v.length + " items" : Object.keys(v).length + " keys"}. (You can undo.)`)) return;
      deleteNode(path);
    });
    actions.appendChild(del);
  }
  row.appendChild(actions);

  nodeEl.appendChild(row);

  // Children
  if ((t === "object" || t === "array") && isExpanded(path)) {
    const children = document.createElement("div");
    children.className = "tree-children";
    if (t === "object") {
      for (const k of Object.keys(value)) {
        children.appendChild(renderTreeNode(value[k], [...path, k]));
      }
    } else {
      value.forEach((v, i) => children.appendChild(renderTreeNode(v, [...path, i])));
    }
    const add = document.createElement("button");
    add.className = "tree-add";
    add.textContent = t === "object" ? "+ key" : "+ item";
    add.addEventListener("click", (e) => { e.stopPropagation(); addChild(path); });
    children.appendChild(add);
    nodeEl.appendChild(children);
  }

  return nodeEl;
}

function addChild(parentPath) {
  const parent = parentPath.length === 0 ? state.doc : getAt(state.doc, parentPath);
  if (!parent || typeof parent !== "object") return;
  pushHistory();
  if (Array.isArray(parent)) {
    const next = [...parent, ""];
    state.doc = parentPath.length === 0 ? next : setAt(state.doc, parentPath, next);
  } else {
    let base = "newKey", k = base, i = 2;
    while (k in parent) k = `${base}${i++}`;
    const next = { ...parent, [k]: "" };
    state.doc = parentPath.length === 0 ? next : setAt(state.doc, parentPath, next);
  }
  state.expanded.add(pathKey(parentPath));
  afterChange();
}

function deleteNode(path) {
  if (path.length === 0) return;
  pushHistory();
  state.doc = deleteAt(state.doc, path);
  if (isSelected(path)) state.selection = null;
  afterChange();
}

function selectPath(path) {
  state.selection = path;
  renderTree();
  renderInspector();
}

/* ══════════════════════════════════════════════════════════════
   TYPE MENU
   ══════════════════════════════════════════════════════════════ */
function showTypeMenu(anchor, path) {
  closeMenus();
  const rect = anchor.getBoundingClientRect();
  const menu = document.createElement("div");
  menu.className = "type-menu";
  menu.style.top = (rect.bottom + 4) + "px";
  menu.style.left = rect.left + "px";
  const types = [
    ["object", "{}  Object"],
    ["array", "[]  Array"],
    ["string", "\"\"  String"],
    ["number", "#   Number"],
    ["boolean", "✓   Boolean"],
    ["null", "∅   Null"],
  ];
  for (const [t, label] of types) {
    const b = document.createElement("button");
    b.textContent = label;
    b.addEventListener("click", () => {
      changeType(path, t);
      closeMenus();
    });
    menu.appendChild(b);
  }
  document.body.appendChild(menu);
  setTimeout(() => document.addEventListener("click", closeMenus, { once: true }), 0);
}

function closeMenus() {
  document.querySelectorAll(".type-menu").forEach(m => m.remove());
}

function changeType(path, type) {
  const cur = path.length === 0 ? state.doc : getAt(state.doc, path);
  const next = coerceTo(cur, type);
  pushHistory();
  state.doc = path.length === 0 ? next : setAt(state.doc, path, next);
  afterChange();
}

/* ══════════════════════════════════════════════════════════════
   RENDERING — OUTPUT
   ══════════════════════════════════════════════════════════════ */
function mdToHtml(md) {
  // Tiny markdown renderer, sufficient for our generated output.
  // Handles: h1-h6, bold, italic, inline code, bullets, tables, paragraphs, links.
  const lines = md.split("\n");
  let html = "";
  let i = 0;
  function escHtml(s) { return s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
  function inline(s) {
    s = escHtml(s);
    s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    return s;
  }
  while (i < lines.length) {
    const line = lines[i];
    // Heading
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) { html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; i++; continue; }
    // Table
    if (/^\|.*\|$/.test(line) && /^\|[\s:|-]+\|$/.test(lines[i+1] || "")) {
      const headers = line.slice(1, -1).split("|").map(s => s.trim());
      i += 2;
      const rows = [];
      while (i < lines.length && /^\|.*\|$/.test(lines[i])) {
        rows.push(lines[i].slice(1, -1).split("|").map(s => s.trim()));
        i++;
      }
      html += "<table><thead><tr>" + headers.map(h => `<th>${inline(h)}</th>`).join("") + "</tr></thead><tbody>";
      for (const r of rows) html += "<tr>" + r.map(c => `<td>${inline(c)}</td>`).join("") + "</tr>";
      html += "</tbody></table>";
      continue;
    }
    // List
    if (/^[-*]\s+/.test(line)) {
      html += "<ul>";
      while (i < lines.length && /^[-*]\s+/.test(lines[i])) {
        html += `<li>${inline(lines[i].replace(/^[-*]\s+/, ""))}</li>`;
        i++;
      }
      html += "</ul>";
      continue;
    }
    if (/^---+\s*$/.test(line)) { html += "<hr>"; i++; continue; }
    if (line.trim() === "") { i++; continue; }
    // Paragraph (possibly multiline)
    let para = line;
    i++;
    while (i < lines.length && lines[i].trim() !== "" && !/^(#{1,6}\s|[-*]\s|\|)/.test(lines[i])) {
      para += " " + lines[i];
      i++;
    }
    html += `<p>${inline(para)}</p>`;
  }
  return html;
}

function renderOutput() {
  const body = document.getElementById("output-body");
  body.innerHTML = "";

  if (state.outputTab === "split") {
    const files = generateFiles();
    const wrap = document.createElement("div");
    wrap.className = "split-plan";
    const h = document.createElement("h3");
    h.textContent = files.length > 1 ? `${files.length} files will be written` : "Single-file output";
    wrap.appendChild(h);
    const list = document.createElement("div"); list.className = "file-list";
    files.forEach(f => {
      const item = document.createElement("div"); item.className = "file-list-item";
      const n = document.createElement("span"); n.textContent = f.name;
      const s = document.createElement("span"); s.className = "size";
      s.textContent = `${f.content.split("\n").length} lines · ${f.content.length} chars`;
      item.appendChild(n); item.appendChild(s);
      list.appendChild(item);
    });
    wrap.appendChild(list);

    if (findTableSources().length > 0) {
      const ws = document.createElement("div");
      ws.style.marginTop = "24px";
      const wh = document.createElement("h3");
      wh.textContent = "XLSX sheets";
      ws.appendChild(wh);
      const wl = document.createElement("div"); wl.className = "file-list";
      findTableSources().forEach(s => {
        const item = document.createElement("div"); item.className = "file-list-item";
        const n = document.createElement("span"); n.textContent = s.name;
        const c = document.createElement("span"); c.className = "size";
        c.textContent = `${s.rows.length} rows · ${s.columns.length} cols`;
        item.appendChild(n); item.appendChild(c);
        wl.appendChild(item);
      });
      ws.appendChild(wl);
      wrap.appendChild(ws);
    }
    body.appendChild(wrap);
    return;
  }

  const files = generateFiles();
  const main = files[0];

  if (state.outputTab === "raw") {
    const pre = document.createElement("div");
    pre.className = "output-view raw";
    pre.textContent = files.length === 1 ? main.content :
      files.map(f => `=== ${f.name} ===\n\n${f.content}`).join("\n\n");
    body.appendChild(pre);
    return;
  }

  // preview
  if (files.length === 1) {
    const view = document.createElement("div");
    view.className = "output-view";
    view.innerHTML = mdToHtml(files[0].content);
    body.appendChild(view);
    return;
  }

  const container = document.createElement("div");
  container.className = "output-view multi";
  files.forEach((f, i) => {
    const banner = document.createElement("div");
    banner.className = "file-banner";
    banner.innerHTML = `<span class="file-ix">${String(i + 1).padStart(2, "0")}</span><span class="file-name">${escapeHtmlAttr(f.name)}</span><span class="file-size">${f.content.length} chars</span>`;
    container.appendChild(banner);
    const block = document.createElement("div");
    block.className = "file-block";
    block.innerHTML = mdToHtml(f.content);
    container.appendChild(block);
  });
  body.appendChild(container);
}

/* ══════════════════════════════════════════════════════════════
   RENDERING — INSPECTOR
   ══════════════════════════════════════════════════════════════ */
function renderInspector() {
  const body = document.getElementById("insp-body");
  body.innerHTML = "";

  // Document tab is always available, regardless of tree selection
  if (state.inspectorTab === "document") {
    renderDocumentInspector(body);
    return;
  }

  const path = state.selection;
  if (path === null) {
    body.innerHTML = `<div class="insp-placeholder">Select a node in the tree to configure how it renders or splits.</div>`;
    return;
  }
  const value = path.length === 0 ? state.doc : getAt(state.doc, path);
  if (value === undefined) {
    body.innerHTML = `<div class="insp-placeholder">Selection no longer exists.</div>`;
    return;
  }

  // Header: path + shape
  const header = document.createElement("div");
  header.className = "insp-section";
  header.innerHTML = `
    <label>Selection</label>
    <div class="insp-path">${path.length === 0 ? "$ (root)" : "$." + patternPath(path).replace(/^\$\.?/, "")}</div>
    <div class="insp-shape">${describeShape(value)}</div>
  `;
  body.appendChild(header);

  if (state.inspectorTab === "rule") renderRuleInspector(body, path, value);
  else if (state.inspectorTab === "split") renderSplitInspector(body, path, value);
}

function renderDocumentInspector(body) {
  const section = document.createElement("div");
  section.className = "insp-section";
  section.innerHTML = `
    <label>Document</label>
    <div class="insp-path">${escapeHtmlAttr(state.docName ? state.docName + ".json" : "(untitled)")}</div>
    <div class="insp-shape">${describeShape(state.doc)}</div>
  `;
  body.appendChild(section);

  // Document front matter
  const fmSection = document.createElement("div");
  fmSection.className = "insp-section";
  fmSection.innerHTML = `<h3>Document front matter</h3>`;
  const row = document.createElement("div"); row.className = "insp-row";
  const ta = document.createElement("textarea");
  ta.className = "insp-input insp-textarea";
  ta.rows = 8;
  ta.spellcheck = false;
  ta.placeholder = `---\ntitle: {$.title}\ndate: {$.timestamp}\nmode: {$.mode}\n---\n`;
  ta.value = state.docFrontMatter || "";
  ta.addEventListener("input", debounced(() => {
    pushHistory();
    state.docFrontMatter = ta.value;
    afterChange();
  }, 400));
  row.appendChild(ta);
  fmSection.appendChild(row);
  fmSection.insertAdjacentHTML("beforeend", `
    <div class="insp-help">Inserted at the top of the main output file. When splits are active, this goes into <code>index.md</code>. Per-split child files use the "Front matter" field in the Split tab instead.</div>
    <div class="insp-tokens" style="margin-top:8px;line-height:1.7;">
      Tokens (resolved against document root):<br>
      <code>{.field}</code> or <code>{$.field}</code> field from root<br>
      <code>{.nested.field}</code> nested lookup
    </div>
  `);
  body.appendChild(fmSection);

  // Quick stats
  const stats = document.createElement("div");
  stats.className = "insp-section";
  stats.innerHTML = `<h3>Summary</h3>`;
  const rules = Object.keys(state.rules).length;
  const splits = Object.values(state.splits).filter(s => s.enabled).length;
  const anns = Object.keys(state.annotations).length;
  let nodes = 0;
  (function count(v) { nodes++; if (v && typeof v === "object") { if (Array.isArray(v)) v.forEach(count); else Object.values(v).forEach(count); }})(state.doc);
  const kv = document.createElement("div");
  kv.className = "insp-tokens";
  kv.style.lineHeight = "1.8";
  kv.innerHTML = `
    Nodes: <code>${nodes}</code><br>
    Rules defined: <code>${rules}</code><br>
    Splits active: <code>${splits}</code><br>
    Annotations: <code>${anns}</code>
  `;
  stats.appendChild(kv);
  body.appendChild(stats);
}

function describeShape(v) {
  const t = typeOf(v);
  if (t === "array") {
    if (v.length === 0) return "array · empty";
    if (v.every(x => x && typeof x === "object" && !Array.isArray(x))) {
      const keys = new Set();
      v.forEach(x => Object.keys(x).forEach(k => keys.add(k)));
      return `array of ${v.length} objects · ${keys.size} distinct keys`;
    }
    return `array of ${v.length} ${typeOf(v[0])}s`;
  }
  if (t === "object") return `object · ${Object.keys(v).length} keys`;
  return `${t}`;
}

function renderRuleInspector(body, path, value) {
  const t = typeOf(value);
  const rule = getRule(path) || defaultRule();

  // Role
  const roleSection = document.createElement("div");
  roleSection.className = "insp-section";
  roleSection.innerHTML = `<h3>Render as</h3>`;
  const roles = [["auto", "Auto (default)"], ["heading", "Heading + contents"], ["table", "Table"], ["list", "Bullet list"], ["skip", "Skip (omit)"]];
  const radioWrap = document.createElement("div"); radioWrap.className = "insp-radio";
  const tableApplies =
    (t === "array" && value.length > 0 && value.every(x => x && typeof x === "object" && !Array.isArray(x))) ||
    (t === "object" && Object.keys(value).length > 0);
  for (const [val, label] of roles) {
    if (val === "table" && !tableApplies) continue;
    if (val === "list" && t !== "array") continue;
    const lab = document.createElement("label");
    lab.innerHTML = `<input type="radio" name="role" value="${val}" ${rule.role === val ? "checked" : ""}> ${label}`;
    radioWrap.appendChild(lab);
  }
  roleSection.appendChild(radioWrap);
  radioWrap.addEventListener("change", (e) => {
    if (e.target.name === "role") setRule(path, { role: e.target.value });
  });
  body.appendChild(roleSection);

  // Object table mode
  if (t === "object" && rule.role === "table") {
    const tmSection = document.createElement("div");
    tmSection.className = "insp-section";
    tmSection.innerHTML = `<h3>Table mode</h3>`;
    const row = document.createElement("div"); row.className = "insp-row";
    const sel = document.createElement("select"); sel.className = "insp-select";
    const allObjValues = Object.values(value).every(v => v && typeof v === "object" && !Array.isArray(v)) && Object.keys(value).length > 0;
    const modes = [["kv", "Key / Value pairs"]];
    if (allObjValues) modes.push(["rows", "Child objects as rows"]);
    for (const [v, l] of modes) {
      const o = document.createElement("option");
      o.value = v; o.textContent = l;
      if ((rule.tableMode || "kv") === v) o.selected = true;
      sel.appendChild(o);
    }
    sel.addEventListener("change", () => setRule(path, { tableMode: sel.value }));
    row.appendChild(sel);
    tmSection.appendChild(row);
    body.appendChild(tmSection);
  }

  // For tables: columns (arrays of objects, or object-as-table in rows mode)
  const showColumnsForArray = (rule.role === "table" || (rule.role === "auto" && t === "array")) && t === "array" && value.length > 0 && value.every(x => x && typeof x === "object" && !Array.isArray(x));
  const showColumnsForObject = t === "object" && rule.role === "table" && (rule.tableMode || "kv") === "rows" && Object.keys(value).length > 0 && Object.values(value).every(v => v && typeof v === "object" && !Array.isArray(v));
  if (showColumnsForArray || showColumnsForObject) {
    const sample = showColumnsForArray ? value : Object.values(value);
    const colSection = document.createElement("div");
    colSection.className = "insp-section";
    colSection.innerHTML = `<h3>Columns</h3>`;
    const allCols = inferColumns(sample);
    const active = rule.columns && rule.columns.length ? new Set(rule.columns) : new Set(allCols);
    const cb = document.createElement("div"); cb.className = "insp-checkboxes";
    for (const col of allCols) {
      const lab = document.createElement("label"); lab.className = "insp-check";
      const joinVal = rule.joins?.[col] ?? "";
      lab.innerHTML = `
        <input type="checkbox" value="${col}" ${active.has(col) ? "checked" : ""}>
        <span>${col}</span>
        <input type="text" class="join-input" placeholder="join" value="${escapeHtmlAttr(joinVal)}" title="Separator when value is an array">
      `;
      cb.appendChild(lab);
    }
    colSection.appendChild(cb);
    cb.addEventListener("change", (e) => {
      const checks = [...cb.querySelectorAll("input[type=checkbox]")].filter(c => c.checked).map(c => c.value);
      const joins = {};
      cb.querySelectorAll(".insp-check").forEach(row => {
        const col = row.querySelector("input[type=checkbox]").value;
        const j = row.querySelector(".join-input").value;
        if (j) joins[col] = j;
      });
      setRule(path, { columns: checks, joins });
    });
    cb.addEventListener("input", (e) => {
      if (!e.target.classList.contains("join-input")) return;
      const joins = {};
      cb.querySelectorAll(".insp-check").forEach(row => {
        const col = row.querySelector("input[type=checkbox]").value;
        const j = row.querySelector(".join-input").value;
        if (j) joins[col] = j;
      });
      setRule(path, { joins });
    });
    body.appendChild(colSection);
  }

  // Heading options
  if (t === "object" || t === "array") {
    const hSection = document.createElement("div");
    hSection.className = "insp-section";
    hSection.innerHTML = `<h3>Heading</h3>`;
    // Source options
    const options = [["key", "Key name"]];
    if (t === "array" && value.length > 0 && value[0] && typeof value[0] === "object") {
      for (const k of Object.keys(value[0])) {
        const v = value[0][k];
        if (typeof v === "string" || typeof v === "number") options.push(["." + k, `Use .${k}`]);
      }
    } else if (t === "object") {
      for (const k of Object.keys(value)) {
        const v = value[k];
        if (typeof v === "string" || typeof v === "number") options.push(["." + k, `Use .${k}`]);
      }
    }
    const srcRow = document.createElement("div"); srcRow.className = "insp-row";
    srcRow.innerHTML = `<label>Heading from</label>`;
    const sel = document.createElement("select"); sel.className = "insp-select";
    for (const [v, l] of options) {
      const opt = document.createElement("option"); opt.value = v; opt.textContent = l;
      if (v === rule.headingFrom) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.addEventListener("change", () => setRule(path, { headingFrom: sel.value }));
    srcRow.appendChild(sel);
    hSection.appendChild(srcRow);

    // Level

      return md;
    }
  }
  return renderMD(value, path, ctx);
}

/* ══════════════════════════════════════════════════════════════
   XLSX GENERATION
   ══════════════════════════════════════════════════════════════ */
/** Convert an object into an ordered list of sheet sections: primitives as a
 *  Field/Value pair block, then one section per nested object (Field/Value
 *  again), one per array-of-objects (proper column table), one per primitive
 *  array. Each section carries a header. This keeps all of one split child's
 *  data in a single sheet but lays out nested structure legibly. */
function objectToSections(obj) {
  const sections = [];
  const primitives = [];
  const nestedObjects = [];
  const tableArrays = [];
  const listArrays = [];

  for (const [k, v] of Object.entries(obj)) {
    if (v === null || typeof v !== "object") {
      primitives.push([k, v]);
    } else if (Array.isArray(v)) {
      if (v.length === 0) {
        primitives.push([k, "(empty)"]);
      } else if (v.every(x => x !== null && typeof x === "object" && !Array.isArray(x))) {
        tableArrays.push([k, v]);
      } else if (v.every(x => x === null || typeof x !== "object")) {
        primitives.push([k, v.filter(x => x != null).join(", ")]);
      } else {
        listArrays.push([k, v]);
      }
    } else {
      nestedObjects.push([k, v]);
    }
  }

  if (primitives.length > 0) {
    sections.push({
      type: "kv",
      rows: primitives.map(([k, v]) => [humanize(k), v == null ? "" : v]),
    });
  }

  for (const [k, v] of nestedObjects) {
    sections.push({ type: "header", text: humanize(k) + ":" });
    const rows = [];
    for (const [k2, v2] of Object.entries(v)) {
      let val;
      if (v2 === null) val = "";
      else if (typeof v2 !== "object") val = v2;
      else if (Array.isArray(v2)) {
        if (v2.every(x => x === null || typeof x !== "object")) {
          val = v2.filter(x => x != null).join(", ");
        } else {
          val = JSON.stringify(v2);
        }
      } else {
        val = JSON.stringify(v2);
      }
      rows.push([humanize(k2), val]);
    }
    sections.push({ type: "kv", rows });
  }

  for (const [k, v] of tableArrays) {
    sections.push({ type: "header", text: humanize(k) + ":" });
    const keySet = new Set();
    v.forEach(item => Object.keys(item).forEach(k2 => keySet.add(k2)));
    const cols = [...keySet];
    const rows = v.map(item => cols.map(c => {
      const val = item[c];
      if (val == null) return "";
      if (typeof val !== "object") return val;
      if (Array.isArray(val) && val.every(x => x === null || typeof x !== "object")) {
        return val.filter(x => x != null).join(", ");
      }
      return JSON.stringify(val);
    }));
    sections.push({
      type: "table",
      columns: cols.map(c => humanize(c)),
      rows,
    });
  }

  for (const [k, v] of listArrays) {
    sections.push({ type: "header", text: humanize(k) + ":" });
    const rows = v.map(x => [
      typeof x === "object" && x !== null ? JSON.stringify(x) : (x == null ? "" : x)
    ]);
    sections.push({ type: "list", rows });
  }

  return sections;
}

/** Convert a list of sheet sections into a flat AOA for XLSX. */
function sectionsToAOA(sections) {
  const rows = [];
  sections.forEach((section, i) => {
    if (i > 0 && rows.length > 0) rows.push([]); // blank separator
    if (section.type === "header") {
      rows.push([section.text]);
    } else if (section.type === "kv") {
      rows.push(["Field", "Value"]);
      section.rows.forEach(r => rows.push(r));
    } else if (section.type === "table") {
      rows.push(section.columns);
      section.rows.forEach(r => rows.push(r));
    } else if (section.type === "list") {
      section.rows.forEach(r => rows.push(r));
    }
  });
  return rows;
}

function pathDisplay(path) {
  return path.map(p => typeof p === "number" ? `[${p}]` : (p.match(/^[A-Za-z_][A-Za-z_0-9]*$/) ? "." + p : `[${JSON.stringify(p)}]`)).join("").replace(/^\./, "") || "$";
}

function findTableSources() {
  // Returns a list of sheet sources. Sources come in two shapes:
  //   { name, sections: [...] }        — for split child sheets + Index
  //   { name, rows: [...], columns }   — for table-rule sheets (legacy)
  const splitSources = [];
  const tableSources = [];
  const activeSplits = findActiveSplits();

  function walk(val, path) {
    if (Array.isArray(val) && val.length > 0 && val.every(v => v && typeof v === "object" && !Array.isArray(v))) {
      const rule = getRule(path);
      const split = getSplit(path);
      const isTable = rule?.role === "table";
      const isSplit = split?.enabled;

      if (isSplit) {
        const parent = path.length === 0 ? state.doc : getAt(state.doc, path.slice(0, -1));
        val.forEach((item, i) => {
          const name = applySlug(resolveTemplate(split.template, item, i, val, parent).replace(/\.md$/i, ""), split.slug).slice(0, 31);
          const sections = objectToSections(item);
          splitSources.push({
            name: name || `Sheet ${i + 1}`,
            sections,
            sourcePath: pathDisplay([...path, i]),
          });
        });
        return;
      }

      if (isTable) {
        const cols = rule.columns && rule.columns.length ? rule.columns : inferColumns(val);
        const headers = cols.map(c => formatLabel(c.replace(/^\./, "").split(".").pop(), rule.labelFormat || "titleCase"));
        const rows = val.map(item => {
          const row = {};
          cols.forEach((col, idx) => {
            const subpath = col.replace(/^\./, "").split(".").filter(Boolean);
            const v = getAt(item, subpath);
            const join = rule.joins?.[col] ?? ", ";
            row[headers[idx]] = typeof v === "object" && v !== null ? mdInline(v, join, rule) : v;
          });
          return row;
        });
        const sheetName = (path[path.length - 1] ? humanize(String(path[path.length - 1])) : "Data").slice(0, 31);
        tableSources.push({ name: sheetName, rows, columns: headers, sourcePath: pathDisplay(path) });
        return;
      }
    }
    if (val && typeof val === "object") {
      const entries = Array.isArray(val) ? val.map((v, i) => [i, v]) : Object.entries(val);
      for (const [k, v] of entries) walk(v, [...path, k]);
    }
  }
  walk(state.doc, []);

  const sources = [];

  // Index sheet — top-level summary plus the sheet-map, when splits are active
  if (splitSources.length > 0 && state.doc && typeof state.doc === "object" && !Array.isArray(state.doc)) {
    const sections = [];
    const primRows = [];
    for (const [k, v] of Object.entries(state.doc)) {
      if (v === null || typeof v !== "object") {
        primRows.push([humanize(k), v == null ? "" : v]);
      } else if (Array.isArray(v)) {
        primRows.push([humanize(k), `array (${v.length} items)`]);
      } else {
        primRows.push([humanize(k), `object (${Object.keys(v).length} keys)`]);
      }
    }
    if (primRows.length > 0) sections.push({ type: "kv", rows: primRows });

    sections.push({ type: "header", text: "Split files:" });
    sections.push({
      type: "table",
      columns: ["Sheet", "Source"],
      rows: splitSources.map(s => [s.name, s.sourcePath]),
    });
    sources.push({ name: "Index", sections });
  }

  sources.push(...tableSources, ...splitSources);

  // Deduplicate sheet names (Excel would reject or auto-rename otherwise)
  const names = new Map();
  for (const s of sources) {
    const c = (names.get(s.name) || 0) + 1;
    names.set(s.name, c);
    if (c > 1) s.name = (s.name + " " + c).slice(0, 31);
  }
  return sources;
}

function generateXLSXBlob() {
  if (window.__XLSX_MISSING || typeof XLSX === "undefined") return null;
  const sources = findTableSources();
  const wb = XLSX.utils.book_new();
  if (sources.length === 0) {
    // Fallback: flatten doc to two-column sheet
    const rows = [];
    function flatten(val, prefix) {
      if (val && typeof val === "object") {
        const entries = Array.isArray(val) ? val.map((v, i) => [i, v]) : Object.entries(val);
        for (const [k, v] of entries) flatten(v, prefix ? `${prefix}.${k}` : String(k));
      } else {
        rows.push({ Path: prefix, Value: val });
      }
    }
    flatten(state.doc, "");
    const sheet = XLSX.utils.json_to_sheet(rows);
    autoFitColumns(sheet);
    XLSX.utils.book_append_sheet(wb, sheet, "Document");
  } else {
    for (const s of sources) {
      const sheet = s.sections
        ? XLSX.utils.aoa_to_sheet(sectionsToAOA(s.sections))
        : XLSX.utils.json_to_sheet(s.rows);
      autoFitColumns(sheet);
      XLSX.utils.book_append_sheet(wb, sheet, s.name);
    }
  }
  return XLSX.write(wb, { bookType: "xlsx", type: "array" });
}

/** Walk a worksheet's cells and set column widths to fit their content.
 *  Uses XLSX-style `wch` (character count) units. Caps at a reasonable
 *  maximum so a single huge cell can't blow the layout out. */
function autoFitColumns(ws) {
  if (!ws || !ws["!ref"]) return;
  const range = XLSX.utils.decode_range(ws["!ref"]);
  const widths = [];
  for (let C = range.s.c; C <= range.e.c; C++) {
    let max = 4; // sensible minimum
    for (let R = range.s.r; R <= range.e.r; R++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      const cell = ws[addr];
      if (!cell) continue;
      const display = cell.w !== undefined ? cell.w
                    : cell.v === null || cell.v === undefined ? ""
                    : String(cell.v);
      // Take the longest line in case a cell is multi-line
      const lines = display.split("\n");
      for (const line of lines) {
        if (line.length > max) max = line.length;
      }
    }
    // Padding plus a soft cap; very wide content can still wrap visually.
    widths[C - range.s.c] = { wch: Math.min(60, max + 2) };
  }
  ws["!cols"] = widths;
}

/* ══════════════════════════════════════════════════════════════
   RENDERING — TREE
   ══════════════════════════════════════════════════════════════ */
function isExpanded(path) { return state.expanded.has(pathKey(path)); }
function toggleExpanded(path) {
  const k = pathKey(path);
  if (state.expanded.has(k)) state.expanded.delete(k);
  else state.expanded.add(k);
  renderTree();
}

function isSelected(path) { return state.selection !== null && pathKey(path) === pathKey(state.selection); }

function renderTree() {
  const root = document.getElementById("tree-body");
  root.innerHTML = "";
  // Compute the search match-set and auto-expand ancestors of matches.
  const ctx = computeSearchContext(state.search);
  root.appendChild(renderTreeNode(state.doc, [], ctx));
  updateSearchUIState(ctx);
}

/** Walk the tree and find all paths whose key or value matches the query.
 *  Returns:
 *    visible: Set<pathKey> — every path that should be rendered (matches + ancestors).
 *    matches: Set<pathKey> — every path that is itself a direct match.
 *    query:   the lowercased query (or "" if no search).
 *  Also auto-expands every ancestor of a match so matches are reachable. */
function computeSearchContext(rawQuery) {
  const query = (rawQuery || "").trim().toLowerCase();
  if (!query) return { query: "", visible: null, matches: null, count: 0 };

  const matches = new Set();
  const visible = new Set();
  function add(path) {
    visible.add(pathKey(path));
    for (let i = 1; i <= path.length; i++) {
      visible.add(pathKey(path.slice(0, -i)));
    }
  }
  function walk(value, path) {
    // Check this node
    const lastSeg = path[path.length - 1];
    const keyText = path.length === 0 ? "" : (typeof lastSeg === "number" ? `[${lastSeg}]` : String(lastSeg));
    const t = typeOf(value);
    let valueText = "";
    if (t === "string" || t === "number" || t === "boolean") valueText = String(value);
    if (keyText.toLowerCase().includes(query) || valueText.toLowerCase().includes(query)) {
      matches.add(pathKey(path));
      add(path);
      // Auto-expand all ancestors so the match is reachable
      for (let i = 0; i < path.length; i++) {
        state.expanded.add(pathKey(path.slice(0, i)));
      }
    }
    if (t === "object") for (const k of Object.keys(value)) walk(value[k], [...path, k]);
    else if (t === "array") value.forEach((v, i) => walk(v, [...path, i]));
  }
  walk(state.doc, []);
  // Always include root so something renders even if root itself isn't a match
  visible.add(pathKey([]));
  return { query, visible, matches, count: matches.size };
}

function updateSearchUIState(ctx) {
  const wrap = document.getElementById("tree-search-wrap");
  const count = document.getElementById("tree-search-count");
  if (!wrap || !count) return;
  if (ctx.query) {
    wrap.classList.add("has-query");
    count.textContent = `${ctx.count} match${ctx.count === 1 ? "" : "es"}`;
  } else {
    wrap.classList.remove("has-query");
    count.textContent = "";
  }
}

function typeLabel(t) {
  return { object: "{}", array: "[]", string: "\"\"", number: "#", boolean: "✓", null: "∅" }[t];
}

function buildTreeMarks(path, t, value) {
  const marks = [];
  // Rule
  const rule = t === "array" ? getArrayRule(path) : getRule(path);
  if (rule) {
    const role = rule.role || "auto";
    if (role !== "auto") {
      marks.push({ kind: "role-" + role, label: role, title: `Render as: ${role}` });
    }
  }
  // Split
  const split = getSplit(path);
  if (split && split.enabled) {
    marks.push({ kind: "split", label: "split", title: "Split into files" });
  }
  // Annotation
  const ann = getAnnotation(path);
  if (ann && (ann.before || ann.after)) {
    const parts = [];
    if (ann.before) parts.push("before");
    if (ann.after) parts.push("after");
    marks.push({ kind: "ann", label: "※", title: "Annotation (" + parts.join(" + ") + ")" });
  }
  return marks;
}

function renderTreeNode(value, path, ctx) {
  // If a search is active and this path isn't in the visible set, skip it.
  // The root path is always visible (computeSearchContext adds it).
  if (ctx && ctx.visible && !ctx.visible.has(pathKey(path))) {
    return document.createDocumentFragment();
  }

  const t = typeOf(value);
  const nodeEl = document.createElement("div");
  nodeEl.className = "tree-node";
  if (isSelected(path)) nodeEl.classList.add("selected");

  const row = document.createElement("div");
  row.className = "tree-row";
  row.dataset.path = pathKey(path);
  // Whole row selects; pill and expand arrow stop propagation.
  row.addEventListener("click", (e) => {
    if (e.target.closest(".tree-expand,.type-pill")) return;
    selectPath(path);
    // Move keyboard focus to tree-body so arrow keys work without an extra click
    const treeBody = document.getElementById("tree-body");
    if (treeBody && typeof treeBody.focus === "function") treeBody.focus();
  });
  // Right-click → context menu (Copy path / Copy value)
  row.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    showTreeContextMenu(e.clientX, e.clientY, path, value);
  });

  // Expand arrow
  if (t === "object" || t === "array") {
    const arrow = document.createElement("button");
    arrow.className = "tree-expand";
    arrow.textContent = isExpanded(path) ? "▼" : "▶";
    arrow.addEventListener("click", (e) => { e.stopPropagation(); toggleExpanded(path); });
    row.appendChild(arrow);
  } else {
    const sp = document.createElement("span"); sp.className = "tree-spacer";
    row.appendChild(sp);
  }

  // Type pill (still clickable to change type via menu)
  const pill = document.createElement("button");
  pill.className = "type-pill type-" + t;
  pill.textContent = typeLabel(t);
  pill.title = "Change type";
  pill.addEventListener("click", (e) => { e.stopPropagation(); showTypeMenu(e.currentTarget, path); });
  row.appendChild(pill);

  // Key — static (with optional highlight)
  const keyEl = document.createElement("span");
  keyEl.className = "tree-key";
  const parentPath = path.slice(0, -1);
  const parent = parentPath.length === 0 ? state.doc : getAt(state.doc, parentPath);
  const isArrayChild = Array.isArray(parent);
  const query = (ctx && ctx.query) || "";
  if (path.length === 0) {
    keyEl.classList.add("root-label");
    keyEl.textContent = "root";
  } else if (isArrayChild) {
    keyEl.classList.add("array-index");
    setTextWithHighlight(keyEl, `[${path[path.length - 1]}]`, query);
  } else {
    setTextWithHighlight(keyEl, String(path[path.length - 1]), query);
  }
  row.appendChild(keyEl);

  // Value or summary — static preview only (highlight string/number values)
  if (t === "object" || t === "array") {
    const summary = document.createElement("span");
    summary.className = "tree-summary";
    summary.textContent = t === "object"
      ? `{} ${Object.keys(value).length}`
      : `[] ${value.length}`;
    row.appendChild(summary);
  } else {
    const sep = document.createElement("span"); sep.className = "tree-sep"; sep.textContent = ":";
    row.appendChild(sep);
    const valEl = document.createElement("span");
    valEl.className = "tree-value value-" + t;
    setTextWithHighlight(valEl, formatValuePreview(value), query);
    row.appendChild(valEl);
  }

  // Rule / split / annotation markers
  const marks = buildTreeMarks(path, t, value);
  if (marks.length) {
    const wrap = document.createElement("span");
    wrap.className = "tree-marks";
    for (const m of marks) {
      const chip = document.createElement("span");
      chip.className = "mark mark-" + m.kind;
      chip.textContent = m.label;
      chip.title = m.title;
      wrap.appendChild(chip);
    }
    row.appendChild(wrap);
  }

  nodeEl.appendChild(row);

  // Children
  if ((t === "object" || t === "array") && isExpanded(path)) {
    const children = document.createElement("div");
    children.className = "tree-children";
    if (t === "object") {
      for (const k of Object.keys(value)) {
        children.appendChild(renderTreeNode(value[k], [...path, k], ctx));
      }
    } else {
      value.forEach((v, i) => children.appendChild(renderTreeNode(v, [...path, i], ctx)));
    }
    // The + key / + item button is hidden during a search (it would make
    // the new row vanish since it doesn't match). Otherwise show as before.
    if (!(ctx && ctx.query)) {
      const add = document.createElement("button");
      add.className = "tree-add";
      add.textContent = t === "object" ? "+ key" : "+ item";
      add.title = t === "object" ? "Add a new key under this object" : "Append an item to this array";
      add.addEventListener("click", (e) => { e.stopPropagation(); addChild(path); });
      children.appendChild(add);
    }
    nodeEl.appendChild(children);
  }

  return nodeEl;
}

/** Set element text content, optionally highlighting case-insensitive matches
 *  of `query` with <mark> wrappers. Uses safe DOM operations (no innerHTML). */
function setTextWithHighlight(el, text, query) {
  el.textContent = "";
  if (!query) { el.textContent = text; return; }
  const lower = text.toLowerCase();
  const q = query.toLowerCase();
  let i = 0;
  while (i < text.length) {
    const hit = lower.indexOf(q, i);
    if (hit < 0) {
      el.appendChild(document.createTextNode(text.slice(i)));
      break;
    }
    if (hit > i) el.appendChild(document.createTextNode(text.slice(i, hit)));
    const mark = document.createElement("mark");
    mark.textContent = text.slice(hit, hit + q.length);
    el.appendChild(mark);
    i = hit + q.length;
  }
}

function addChild(parentPath) {
  const parent = parentPath.length === 0 ? state.doc : getAt(state.doc, parentPath);
  if (!parent || typeof parent !== "object") return;
  pushHistory();
  let newKey;
  if (Array.isArray(parent)) {
    newKey = parent.length;
    const next = [...parent, ""];
    state.doc = parentPath.length === 0 ? next : setAt(state.doc, parentPath, next);
  } else {
    let base = "newKey", k = base, i = 2;
    while (k in parent) k = `${base}${i++}`;
    newKey = k;
    const next = { ...parent, [k]: "" };
    state.doc = parentPath.length === 0 ? next : setAt(state.doc, parentPath, next);
  }
  state.expanded.add(pathKey(parentPath));
  // Select the parent so the new row shows up in the Editor pane,
  // then focus the new row's key input (or value input for arrays)
  // so the user can start typing immediately.
  state.selection = parentPath;
  afterChange();
  setTimeout(() => {
    const body = document.getElementById("editor-body");
    if (!body) return;
    const rows = body.querySelectorAll(".editor-row");
    const lastRow = rows[rows.length - 1];
    if (!lastRow) return;
    const target = Array.isArray(parent)
      ? lastRow.querySelector(".value-input, textarea, .bool-inline button")
      : lastRow.querySelector(".key-input:not(.index-label)");
    if (target && typeof target.focus === "function") {
      target.focus();
      if (typeof target.select === "function") target.select();
    }
  }, 0);
}

function deleteNode(path) {
  if (path.length === 0) return;
  pushHistory();
  state.doc = deleteAt(state.doc, path);
  if (isSelected(path)) state.selection = null;
  afterChange();
}

/** Move a child within its parent from one position to another.
 *  For arrays: splice. For objects: rebuild with keys in new order. */
function moveChild(parentPath, fromKey, toIndex) {
  const parent = parentPath.length === 0 ? state.doc : getAt(state.doc, parentPath);
  if (!parent || typeof parent !== "object") return;
  if (Array.isArray(parent)) {
    const fromIndex = typeof fromKey === "number" ? fromKey : parseInt(fromKey, 10);
    if (!Number.isFinite(fromIndex)) return;
    if (fromIndex === toIndex) return;
    const next = parent.slice();
    const [item] = next.splice(fromIndex, 1);
    // Adjust target index if removing from before it
    const insertAt = toIndex > fromIndex ? toIndex - 1 : toIndex;
    next.splice(insertAt, 0, item);
    pushHistory();
    state.doc = parentPath.length === 0 ? next : setAt(state.doc, parentPath, next);
    // Keep the selection on the moved item if it was selected
    if (state.selection && state.selection.length > parentPath.length &&
        pathKey(state.selection.slice(0, parentPath.length)) === pathKey(parentPath) &&
        state.selection[parentPath.length] === fromIndex) {
      state.selection = [...parentPath, insertAt, ...state.selection.slice(parentPath.length + 1)];
    }
    afterChange();
    return;
  }
  // Object: rebuild key order
  const keys = Object.keys(parent);
  const fromIndex = keys.indexOf(String(fromKey));
  if (fromIndex < 0) return;
  if (fromIndex === toIndex) return;
  const reorderedKeys = keys.slice();
  const [movedKey] = reorderedKeys.splice(fromIndex, 1);
  const insertAt = toIndex > fromIndex ? toIndex - 1 : toIndex;
  reorderedKeys.splice(insertAt, 0, movedKey);
  const next = {};
  for (const k of reorderedKeys) next[k] = parent[k];
  pushHistory();
  state.doc = parentPath.length === 0 ? next : setAt(state.doc, parentPath, next);
  afterChange();
}

function selectPath(path) {
  state.selection = path;
  renderTree();
  renderEditor();
  renderInspector();
  // Scroll the tree row into view if possible
  setTimeout(() => {
    const row = document.querySelector(`.tree-row[data-path='${CSS.escape(pathKey(path))}']`);
    if (row && typeof row.scrollIntoView === "function") {
      row.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }
  }, 0);
}

/** Build a flat ordered list of currently-visible tree paths, respecting
 *  expanded/collapsed state and the active search filter. Used for
 *  keyboard navigation. */
function getVisibleTreePaths() {
  const ctx = computeSearchContext(state.search);
  const out = [];
  function walk(value, path) {
    if (ctx.visible && !ctx.visible.has(pathKey(path))) return;
    out.push(path);
    const t = typeOf(value);
    if ((t === "object" || t === "array") && isExpanded(path)) {
      if (t === "object") for (const k of Object.keys(value)) walk(value[k], [...path, k]);
      else value.forEach((v, i) => walk(v, [...path, i]));
    }
  }
  walk(state.doc, []);
  return out;
}

function handleTreeKeydown(e) {
  const list = getVisibleTreePaths();
  if (list.length === 0) return;
  const cur = state.selection ? pathKey(state.selection) : null;
  let idx = list.findIndex(p => pathKey(p) === cur);
  if (idx < 0) idx = 0;
  const path = list[idx];
  const value = path.length === 0 ? state.doc : getAt(state.doc, path);
  const t = typeOf(value);
  const isContainer = t === "object" || t === "array";

  switch (e.key) {
    case "ArrowDown": {
      e.preventDefault();
      const next = list[Math.min(list.length - 1, idx + 1)];
      if (next) selectPath(next);
      break;
    }
    case "ArrowUp": {
      e.preventDefault();
      const prev = list[Math.max(0, idx - 1)];
      if (prev) selectPath(prev);
      break;
    }
    case "ArrowRight": {
      e.preventDefault();
      if (isContainer && !isExpanded(path)) {
        state.expanded.add(pathKey(path));
        renderTree();
      } else if (isContainer && isExpanded(path)) {
        // Already expanded — move to first child
        const next = list[idx + 1];
        if (next && next.length > path.length) selectPath(next);
      }
      break;
    }
    case "ArrowLeft": {
      e.preventDefault();
      if (isContainer && isExpanded(path)) {
        state.expanded.delete(pathKey(path));
        renderTree();
      } else if (path.length > 0) {
        // Move to parent
        selectPath(path.slice(0, -1));
      }
      break;
    }
    case "Enter": {
      e.preventDefault();
      // Move focus to the corresponding key/value input in the editor pane
      const body = document.getElementById("editor-body");
      if (!body) return;
      // The editor will already be showing this node (or its parent for
      // a leaf). Find the focused row's input and focus it.
      const focused = body.querySelector(".editor-row.is-focused");
      if (focused) {
        const target =
          focused.querySelector(".key-input:not(.index-label)") ||
          focused.querySelector(".value-input, textarea, .bool-inline button");
        if (target && typeof target.focus === "function") target.focus();
      } else {
        // Selection points to a container — focus the first row's key
        const firstRow = body.querySelector(".editor-row");
        if (firstRow) {
          const target =
            firstRow.querySelector(".key-input:not(.index-label)") ||
            firstRow.querySelector(".value-input, textarea");
          if (target && typeof target.focus === "function") target.focus();
        }
      }
      break;
    }
    case " ":
    case "Spacebar": {
      // Toggle expand on space
      if (!isContainer) return;
      e.preventDefault();
      if (isExpanded(path)) state.expanded.delete(pathKey(path));
      else state.expanded.add(pathKey(path));
      renderTree();
      break;
    }
    case "Home": {
      e.preventDefault();
      selectPath([]);
      break;
    }
    case "End": {
      e.preventDefault();
      selectPath(list[list.length - 1]);
      break;
    }
  }
}

/* ══════════════════════════════════════════════════════════════
   RENDERING — EDITOR PANE
   ══════════════════════════════════════════════════════════════ */
function renderEditor() {
  const body = document.getElementById("editor-body");
  if (!body) return;

  // Skip re-render if the user is actively typing inside the editor
  const active = document.activeElement;
  if (active && body.contains(active) && (active.tagName === "TEXTAREA" || (active.tagName === "INPUT" && (active.type === "text" || active.type === "number")))) {
    return;
  }

  const scrollTop = body.scrollTop;
  body.innerHTML = "";

  // Default to root when nothing selected
  const path = state.selection || [];
  const value = path.length === 0 ? state.doc : getAt(state.doc, path);

  if (value === undefined) {
    body.innerHTML = `<div class="editor-empty">Selection no longer exists. Pick a node in Structure.</div>`;
    return;
  }

  const t = typeOf(value);

  // If a leaf scalar is selected, show its parent's container view instead
  // and highlight the row for this leaf. This way the user can edit the
  // *key* of the selected leaf directly — selecting a leaf in Structure
  // makes its key immediately editable in the Editor.
  if (path.length > 0 && (t === "string" || t === "number" || t === "boolean" || t === "null")) {
    const parentPath = path.slice(0, -1);
    const parent = parentPath.length === 0 ? state.doc : getAt(state.doc, parentPath);
    if (parent && typeof parent === "object") {
      body.appendChild(renderEditorBreadcrumb(parentPath, parent));
      const shape = document.createElement("div");
      shape.className = "editor-shape";
      shape.textContent = describeShape(parent);
      body.appendChild(shape);
      const focusKey = path[path.length - 1];
      renderEditorContainer(body, parentPath, parent, typeOf(parent), focusKey);
      body.scrollTop = scrollTop;
      return;
    }
  }

  body.appendChild(renderEditorBreadcrumb(path, value));

  const shape = document.createElement("div");
  shape.className = "editor-shape";
  shape.textContent = describeShape(value);
  body.appendChild(shape);

  if (t === "object" || t === "array") {
    renderEditorContainer(body, path, value, t);
  } else {
    renderEditorScalar(body, path, value, t);
  }

  body.scrollTop = scrollTop;
}

function renderEditorBreadcrumb(path, value) {
  const bar = document.createElement("div");
  bar.className = "editor-breadcrumb";

  // Root crumb
  const rootCrumb = document.createElement("span");
  rootCrumb.className = "crumb" + (path.length === 0 ? " current" : "");
  rootCrumb.textContent = "$";
  rootCrumb.title = "Root";
  rootCrumb.addEventListener("click", () => { if (path.length > 0) selectPath([]); });
  bar.appendChild(rootCrumb);

  for (let i = 0; i < path.length; i++) {
    const sep = document.createElement("span"); sep.className = "sep"; sep.textContent = "›";
    bar.appendChild(sep);

    const seg = path[i];
    const crumb = document.createElement("span");
    const isLast = i === path.length - 1;
    crumb.className = "crumb" + (isLast ? " current" : "");
    crumb.textContent = typeof seg === "number" ? `[${seg}]` : String(seg);
    if (!isLast) {
      crumb.addEventListener("click", () => selectPath(path.slice(0, i + 1)));
    }
    bar.appendChild(crumb);
  }
  return bar;
}

function renderEditorScalar(body, path, value, t) {
  const wrap = document.createElement("div");
  wrap.className = "editor-scalar";

  const typeRow = document.createElement("div");
  typeRow.className = "value-wrap";

  const pill = document.createElement("button");
  pill.className = "type-pill type-" + t;
  pill.textContent = typeLabel(t);
  pill.title = "Change type";
  pill.addEventListener("click", (e) => { e.stopPropagation(); showTypeMenu(e.currentTarget, path); });
  typeRow.appendChild(pill);

  const fieldWrap = document.createElement("div");
  fieldWrap.style.flex = "1";
  fieldWrap.style.minWidth = "0";

  const label = document.createElement("label");
  label.textContent = "Value";
  fieldWrap.appendChild(label);

  if (t === "null") {
    const hint = document.createElement("div");
    hint.className = "null-hint";
    hint.textContent = "null — change type to assign a value.";
    fieldWrap.appendChild(hint);
  } else if (t === "boolean") {
    const row = document.createElement("div");
    row.className = "bool-row";
    for (const [val, label] of [[true, "true"], [false, "false"]]) {
      const btn = document.createElement("button");
      btn.className = "bool-btn" + (value === val ? " active" : "");
      btn.textContent = label;
      btn.addEventListener("click", () => {
        pushHistory();
        state.doc = setAt(state.doc, path, val);
        afterChange();
      });
      row.appendChild(btn);
    }
    fieldWrap.appendChild(row);
  } else if (t === "number") {
    const inp = document.createElement("input");
    inp.type = "number";
    inp.step = "any";
    inp.value = String(value);
    inp.addEventListener("input", debounced(() => {
      const n = Number(inp.value);
      if (!Number.isFinite(n)) return;
      pushHistory();
      state.doc = setAt(state.doc, path, n);
      afterChange();
    }, 300));
    fieldWrap.appendChild(inp);
  } else {
    // string — use textarea to allow multi-line
    const ta = document.createElement("textarea");
    ta.value = String(value);
    ta.spellcheck = false;
    ta.addEventListener("input", debounced(() => {
      pushHistory();
      state.doc = setAt(state.doc, path, ta.value);
      afterChange();
    }, 300));
    fieldWrap.appendChild(ta);
  }

  typeRow.appendChild(fieldWrap);
  wrap.appendChild(typeRow);
  body.appendChild(wrap);
}

function renderEditorContainer(body, path, value, t, focusKey) {
  const rows = document.createElement("div");
  rows.className = "editor-rows";

  const keys = t === "array" ? value.map((_, i) => i) : Object.keys(value);

  if (keys.length === 0) {
    const empty = document.createElement("div");
    empty.className = "editor-empty";
    empty.textContent = t === "array" ? "Empty array. Use + item below to add." : "Empty object. Use + key below to add.";
    rows.appendChild(empty);
  } else {
    for (const k of keys) {
      rows.appendChild(renderEditorRow(path, value, k, t, k === focusKey));
    }
  }
  body.appendChild(rows);

  // Sticky add bar
  const addWrap = document.createElement("div");
  addWrap.className = "editor-add-wrap";
  const add = document.createElement("button");
  add.className = "editor-add";
  add.textContent = t === "array" ? "+ item" : "+ key";
  add.addEventListener("click", () => addChild(path));
  addWrap.appendChild(add);
  body.appendChild(addWrap);

  // After rendering, focus the targeted row's key input (or value input
  // for arrays where keys are not editable) and scroll it into view.
  if (focusKey !== undefined) {
    setTimeout(() => {
      const focused = rows.querySelector(".editor-row.is-focused");
      if (!focused) return;
      const target = t === "array"
        ? focused.querySelector(".value-input, textarea, .bool-inline button")
        : focused.querySelector(".key-input:not(.index-label)");
      if (target && typeof target.focus === "function") {
        target.focus();
        if (typeof target.select === "function") target.select();
      }
      if (typeof focused.scrollIntoView === "function") {
        focused.scrollIntoView({ block: "nearest" });
      }
    }, 0);
  }
}

function renderEditorRow(parentPath, parent, key, parentType, isFocused) {
  const childPath = [...parentPath, key];
  const childValue = parent[key];
  const ct = typeOf(childValue);
  const isContainer = ct === "object" || ct === "array";

  const row = document.createElement("div");
  row.className = "editor-row" + (isContainer ? " is-container" : "") + (isFocused ? " is-focused" : "");

  // Drag handle — used to reorder this row within its parent
  const handle = document.createElement("span");
  handle.className = "drag-handle";
  handle.textContent = "⋮⋮";
  handle.title = "Drag to reorder";
  // The whole row is draggable, but only when the handle is grabbed.
  // We set draggable=true on mousedown over the handle and clear it after drag.
  handle.addEventListener("mousedown", () => { row.draggable = true; });
  row.addEventListener("dragstart", (e) => {
    e.stopPropagation();
    row.classList.add("dragging");
    // Carry the source key in the dataTransfer so cross-row handlers can read it
    try {
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", JSON.stringify({ parentPath, key }));
    } catch {}
  });
  row.addEventListener("dragend", () => {
    row.classList.remove("dragging");
    row.draggable = false;
    // Clear any drop indicators left in sibling rows
    const rowsContainer = row.parentElement;
    if (rowsContainer) {
      rowsContainer.querySelectorAll(".editor-row").forEach(r => {
        r.classList.remove("drop-before", "drop-after");
      });
    }
  });
  // Allow this row to be a drop target
  row.addEventListener("dragover", (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    const rect = row.getBoundingClientRect();
    const before = (e.clientY - rect.top) < rect.height / 2;
    row.classList.toggle("drop-before", before);
    row.classList.toggle("drop-after", !before);
  });
  row.addEventListener("dragleave", (e) => {
    // Only clear when leaving the row entirely (not just transitioning between children)
    if (!row.contains(e.relatedTarget)) {
      row.classList.remove("drop-before", "drop-after");
    }
  });
  row.addEventListener("drop", (e) => {
    e.preventDefault();
    e.stopPropagation();
    const before = row.classList.contains("drop-before");
    row.classList.remove("drop-before", "drop-after");
    let payload;
    try { payload = JSON.parse(e.dataTransfer.getData("text/plain")); } catch { return; }
    if (!payload || pathKey(payload.parentPath) !== pathKey(parentPath)) return;
    const keys = parentType === "array" ? parent.map((_,i) => i) : Object.keys(parent);
    const targetIdx = keys.indexOf(parentType === "array" ? key : String(key));
    const insertAt = before ? targetIdx : targetIdx + 1;
    moveChild(parentPath, payload.key, insertAt);
  });
  row.appendChild(handle);

  // Clicking anywhere on a row (outside its editable controls) selects the
  // child path so the Inspector reflects this row's rule. Container rows
  // additionally navigate in (selectPath on a container makes the Editor
  // show that container's contents); scalar rows just become the focused
  // row of the parent's view.
  row.addEventListener("click", (e) => {
    if (e.target.closest("input, textarea, button, select, .type-pill, .drag-handle, .row-delete")) return;
    selectPath(childPath);
  });

  // Type pill — placed before the key, matching the Structure pane convention
  const pill = document.createElement("button");
  pill.className = "type-pill type-" + ct;
  pill.textContent = typeLabel(ct);
  pill.title = "Change type";
  pill.addEventListener("click", (e) => { e.stopPropagation(); showTypeMenu(e.currentTarget, childPath); });
  row.appendChild(pill);

  // Key input / index label
  const keyInput = document.createElement("input");
  keyInput.type = "text";
  keyInput.className = "key-input" + (parentType === "array" ? " index-label" : "");
  keyInput.value = parentType === "array" ? `[${key}]` : String(key);
  keyInput.spellcheck = false;
  // Focusing the key input means the user is interested in this row —
  // sync the selection so the Inspector shows this row's rule.
  // (renderEditor skips re-rendering while a text input is focused, so
  // this won't destroy the input mid-edit.)
  keyInput.addEventListener("focus", () => {
    if (!state.selection || pathKey(state.selection) !== pathKey(childPath)) {
      selectPath(childPath);
    }
  });
  if (parentType === "object") {
    keyInput.addEventListener("change", () => {
      const newKey = keyInput.value.trim();
      if (!newKey || newKey === key) { keyInput.value = String(key); return; }
      if (Object.keys(parent).includes(newKey)) {
        keyInput.value = String(key);
        flashStatus(`Key "${newKey}" already exists`, true);
        return;
      }
      pushHistory();
      state.doc = renameKeyAt(state.doc, parentPath, key, newKey);
      afterChange();
    });
  }
  row.appendChild(keyInput);

  // Value area
  const valueArea = document.createElement("div");
  valueArea.className = "value-area";

  if (isContainer) {
    const summary = document.createElement("span");
    summary.className = "container-summary";
    summary.textContent = ct === "array"
      ? `[] ${childValue.length} item${childValue.length === 1 ? "" : "s"}`
      : `{} ${Object.keys(childValue).length} key${Object.keys(childValue).length === 1 ? "" : "s"}`;
    valueArea.appendChild(summary);

    const open = document.createElement("button");
    open.className = "open-btn";
    open.textContent = "Open →";
    open.addEventListener("click", (e) => { e.stopPropagation(); selectPath(childPath); });
    valueArea.appendChild(open);
  } else if (ct === "null") {
    const span = document.createElement("span");
    span.className = "container-summary";
    span.textContent = "null";
    valueArea.appendChild(span);
  } else if (ct === "boolean") {
    const wrap = document.createElement("div");
    wrap.className = "bool-inline";
    for (const [val, lbl] of [[true, "true"], [false, "false"]]) {
      const b = document.createElement("button");
      b.textContent = lbl;
      if (childValue === val) b.classList.add("active");
      b.addEventListener("click", () => {
        pushHistory();
        state.doc = setAt(state.doc, childPath, val);
        afterChange();
      });
      wrap.appendChild(b);
    }
    valueArea.appendChild(wrap);
  } else if (ct === "string") {
    const ta = document.createElement("textarea");
    ta.className = "value-input value-textarea";
    ta.value = String(childValue);
    ta.spellcheck = false;
    ta.rows = 1;
    ta.cols = 30;
    ta.addEventListener("focus", () => {
      if (!state.selection || pathKey(state.selection) !== pathKey(childPath)) {
        selectPath(childPath);
      }
    });
    // Run autosize once the textarea is attached (scrollHeight only valid then),
    // then set up a ResizeObserver so dragging the textarea wider also
    // expands the Editor pane.
    setTimeout(() => {
      autosizeTextarea(ta);
      observeTextareaResize(ta);
    }, 0);
    ta.addEventListener("input", () => {
      autosizeTextarea(ta);
    });
    ta.addEventListener("input", debounced(() => {
      if (ta.value === childValue) return;
      pushHistory();
      state.doc = setAt(state.doc, childPath, ta.value);
      afterChange();
    }, 300));
    valueArea.appendChild(ta);
  } else {
    const inp = document.createElement("input");
    inp.className = "value-input";
    inp.type = "number";
    inp.step = "any";
    inp.value = String(childValue);
    inp.spellcheck = false;
    inp.addEventListener("focus", () => {
      if (!state.selection || pathKey(state.selection) !== pathKey(childPath)) {
        selectPath(childPath);
      }
    });
    inp.addEventListener("input", debounced(() => {
      const n = Number(inp.value);
      if (!Number.isFinite(n)) return;
      if (n === childValue) return;
      pushHistory();
      state.doc = setAt(state.doc, childPath, n);
      afterChange();
    }, 300));
    valueArea.appendChild(inp);
  }
  row.appendChild(valueArea);

  // Delete
  const del = document.createElement("button");
  del.className = "row-delete";
  del.innerHTML = "×";
  del.title = "Delete";
  del.addEventListener("click", (e) => {
    e.stopPropagation();
    const nonEmpty = childValue && typeof childValue === "object" &&
      ((Array.isArray(childValue) && childValue.length > 0) || (!Array.isArray(childValue) && Object.keys(childValue).length > 0));
    const keyLabel = parentType === "array" ? `[${key}]` : String(key);
    if (nonEmpty && !confirm(`Delete ${keyLabel}? It contains ${Array.isArray(childValue) ? childValue.length + " items" : Object.keys(childValue).length + " keys"}. (You can undo.)`)) return;
    deleteNode(childPath);
  });
  row.appendChild(del);

  return row;
}

/* ══════════════════════════════════════════════════════════════
   TYPE MENU
   ══════════════════════════════════════════════════════════════ */
function showTypeMenu(anchor, path) {
  closeMenus();
  const rect = anchor.getBoundingClientRect();
  const menu = document.createElement("div");
  menu.className = "type-menu";
  menu.style.top = (rect.bottom + 4) + "px";
  menu.style.left = rect.left + "px";
  const types = [
    ["object",  "{}  Object",  "An unordered collection of named key/value pairs."],
    ["array",   "[]  Array",   "An ordered list of values. Items can be of mixed types."],
    ["string",  "\"\"  String", "Text. Single- or multi-line."],
    ["number",  "#   Number",  "Integer or decimal. JSON has only one numeric type."],
    ["boolean", "✓   Boolean", "true or false."],
    ["null",    "∅   Null",    "Explicitly empty / no value."],
  ];
  for (const [t, label, desc] of types) {
    const b = document.createElement("button");
    b.title = desc;
    const lab = document.createElement("span");
    lab.className = "type-label";
    lab.textContent = label;
    const sub = document.createElement("span");
    sub.className = "type-desc";
    sub.textContent = desc;
    b.appendChild(lab);
    b.appendChild(sub);
    b.addEventListener("click", () => {
      changeType(path, t);
      closeMenus();
    });
    menu.appendChild(b);
  }
  document.body.appendChild(menu);
  setTimeout(() => document.addEventListener("click", closeMenus, { once: true }), 0);
}

function closeMenus() {
  document.querySelectorAll(".type-menu, .tree-context-menu").forEach(m => m.remove());
}

/** Format a JSON path as a friendly dot/bracket string, e.g. runs[0][1].persona */
function formatJsonPath(path) {
  if (path.length === 0) return "$";
  let out = "$";
  for (const seg of path) {
    if (typeof seg === "number") out += `[${seg}]`;
    else if (/^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(seg)) out += `.${seg}`;
    else out += `[${JSON.stringify(seg)}]`;
  }
  return out;
}

/** Format the rule pattern path the user would set a rule on (array indices
 *  become *). E.g. runs[0][1].persona → runs.*.*.persona */
function formatPatternPath(path) {
  if (path.length === 0) return "$";
  return path.map(p => typeof p === "number" ? "*" : p).join(".");
}

async function copyToClipboard(text) {
  try {
    if (navigator && navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch {}
  // Fallback: temporary textarea + execCommand("copy")
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch {
    return false;
  }
}

function showTreeContextMenu(x, y, path, value) {
  closeMenus();
  const menu = document.createElement("div");
  menu.className = "tree-context-menu";
  menu.style.top = y + "px";
  menu.style.left = x + "px";

  const jsonPath = formatJsonPath(path);
  const patternPathStr = formatPatternPath(path);

  // Path preview at the top
  const preview = document.createElement("div");
  preview.className = "menu-preview";
  preview.textContent = jsonPath;
  preview.title = jsonPath;
  menu.appendChild(preview);

  const sep = document.createElement("div"); sep.className = "menu-sep";
  menu.appendChild(sep);

  const items = [
    {
      label: "Copy path",
      sub: jsonPath,
      action: async () => {
        const ok = await copyToClipboard(jsonPath);
        flashStatus(ok ? `Copied ${jsonPath}` : "Copy failed", !ok);
      },
    },
    {
      label: "Copy pattern path",
      sub: patternPathStr + "  (use as rule key)",
      action: async () => {
        const ok = await copyToClipboard(patternPathStr);
        flashStatus(ok ? `Copied ${patternPathStr}` : "Copy failed", !ok);
      },
    },
    {
      label: "Copy value as JSON",
      sub: previewValueForMenu(value),
      action: async () => {
        const json = JSON.stringify(value, null, 2);
        const ok = await copyToClipboard(json);
        flashStatus(ok ? `Copied value (${json.length} chars)` : "Copy failed", !ok);
      },
    },
  ];

  for (const item of items) {
    const b = document.createElement("button");
    const lab = document.createElement("span");
    lab.className = "menu-label";
    lab.textContent = item.label;
    const sub2 = document.createElement("span");
    sub2.className = "menu-sub";
    sub2.textContent = item.sub;
    b.appendChild(lab);
    b.appendChild(sub2);
    b.addEventListener("click", () => { item.action(); closeMenus(); });
    menu.appendChild(b);
  }

  document.body.appendChild(menu);

  // Reposition if the menu would overflow the viewport
  const rect = menu.getBoundingClientRect();
  const vw = window.innerWidth, vh = window.innerHeight;
  if (rect.right > vw) menu.style.left = (vw - rect.width - 8) + "px";
  if (rect.bottom > vh) menu.style.top = (vh - rect.height - 8) + "px";

  setTimeout(() => document.addEventListener("click", closeMenus, { once: true }), 0);
}

function previewValueForMenu(value) {
  const t = typeOf(value);
  if (t === "string") {
    const s = value.length > 40 ? value.slice(0, 40) + "…" : value;
    return `"${s}"`;
  }
  if (t === "object") return `{} ${Object.keys(value).length} key${Object.keys(value).length === 1 ? "" : "s"}`;
  if (t === "array") return `[] ${value.length} item${value.length === 1 ? "" : "s"}`;
  if (t === "null") return "null";
  return String(value);
}

function changeType(path, type) {
  const cur = path.length === 0 ? state.doc : getAt(state.doc, path);
  const fromType = typeOf(cur);
  if (fromType === type) return;

  // Warn before destructive type changes.
  // - Object → Array: keys discarded (values become items)
  // - Object/Array → scalar (string/number/boolean/null): all contents lost
  // - Scalar → Scalar: never destructive in a way the user couldn't undo
  // - Array → Object: produces keys "0", "1", ... — non-destructive
  let warning = null;
  if (fromType === "object") {
    const keys = Object.keys(cur);
    if (type === "array" && keys.length > 0) {
      warning = `Convert this object to an array?\n\nThe ${keys.length} key${keys.length === 1 ? "" : "s"} (${shortKeyList(keys)}) will be discarded — only the values become items.`;
    } else if ((type === "string" || type === "number" || type === "boolean" || type === "null") && keys.length > 0) {
      warning = `Convert this object to ${type}?\n\nAll ${keys.length} key${keys.length === 1 ? "" : "s"} (${shortKeyList(keys)}) will be deleted.`;
    }
  } else if (fromType === "array") {
    if ((type === "string" || type === "number" || type === "boolean" || type === "null") && cur.length > 0) {
      warning = `Convert this array to ${type}?\n\nAll ${cur.length} item${cur.length === 1 ? "" : "s"} will be deleted.`;
    }
  }
  if (warning && !confirm(warning + "\n\n(You can undo if needed.)")) return;

  const next = coerceTo(cur, type);
  pushHistory();
  state.doc = path.length === 0 ? next : setAt(state.doc, path, next);
  afterChange();
}

function shortKeyList(keys) {
  if (keys.length <= 4) return keys.join(", ");
  return keys.slice(0, 3).join(", ") + `, … (+${keys.length - 3} more)`;
}

/* ══════════════════════════════════════════════════════════════
   RENDERING — OUTPUT
   ══════════════════════════════════════════════════════════════ */
function mdToHtml(md) {
  // Tiny markdown renderer, sufficient for our generated output.
  // Handles: h1-h6, bold, italic, inline code, bullets, tables, paragraphs, links.
  const lines = md.split("\n");
  let html = "";
  let i = 0;
  function escHtml(s) { return s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
  function inline(s) {
    s = escHtml(s);
    s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    return s;
  }
  while (i < lines.length) {
    const line = lines[i];
    // Heading
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) { html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; i++; continue; }
    // Table
    if (/^\|.*\|$/.test(line) && /^\|[\s:|-]+\|$/.test(lines[i+1] || "")) {
      const headers = line.slice(1, -1).split("|").map(s => s.trim());
      i += 2;
      const rows = [];
      while (i < lines.length && /^\|.*\|$/.test(lines[i])) {
        rows.push(lines[i].slice(1, -1).split("|").map(s => s.trim()));
        i++;
      }
      html += "<table><thead><tr>" + headers.map(h => `<th>${inline(h)}</th>`).join("") + "</tr></thead><tbody>";
      for (const r of rows) html += "<tr>" + r.map(c => `<td>${inline(c)}</td>`).join("") + "</tr>";
      html += "</tbody></table>";
      continue;
    }
    // List
    if (/^[-*]\s+/.test(line)) {
      html += "<ul>";
      while (i < lines.length && /^[-*]\s+/.test(lines[i])) {
        html += `<li>${inline(lines[i].replace(/^[-*]\s+/, ""))}</li>`;
        i++;
      }
      html += "</ul>";
      continue;
    }
    if (/^---+\s*$/.test(line)) { html += "<hr>"; i++; continue; }
    if (line.trim() === "") { i++; continue; }
    // Paragraph (possibly multiline)
    let para = line;
    i++;
    while (i < lines.length && lines[i].trim() !== "" && !/^(#{1,6}\s|[-*]\s|\|)/.test(lines[i])) {
      para += " " + lines[i];
      i++;
    }
    html += `<p>${inline(para)}</p>`;
  }
  return html;
}

function countSheetSize(source) {
  if (source.sections) {
    const aoa = sectionsToAOA(source.sections);
    const rows = aoa.length;
    const cols = aoa.reduce((m, r) => Math.max(m, r.length), 0);
    return { rows, cols };
  }
  return { rows: (source.rows?.length || 0) + 1, cols: source.columns?.length || 0 };
}

function renderSheetHtml(source) {
  const table = document.createElement("table");
  table.className = "xlsx-sheet";

  if (source.sections) {
    source.sections.forEach((section, idx) => {
      if (idx > 0) {
        const tr = document.createElement("tr");
        tr.className = "sep-row";
        const td = document.createElement("td");
        td.colSpan = 10; td.innerHTML = "&nbsp;";
        tr.appendChild(td); table.appendChild(tr);
      }
      if (section.type === "header") {
        const tr = document.createElement("tr");
        tr.className = "sec-header";
        const td = document.createElement("td");
        td.colSpan = 10; td.textContent = section.text;
        tr.appendChild(td); table.appendChild(tr);
      } else if (section.type === "kv") {
        const trh = document.createElement("tr");
        trh.className = "kv-header";
        for (const h of ["Field", "Value"]) {
          const th = document.createElement("th"); th.textContent = h; trh.appendChild(th);
        }
        table.appendChild(trh);
        for (const row of section.rows) {
          const tr = document.createElement("tr");
          for (const cell of row) {
            const td = document.createElement("td");
            td.textContent = cell == null ? "" : String(cell);
            tr.appendChild(td);
          }
          table.appendChild(tr);
        }
      } else if (section.type === "table") {
        const trh = document.createElement("tr");
        trh.className = "col-header";
        for (const h of section.columns) {
          const th = document.createElement("th"); th.textContent = h; trh.appendChild(th);
        }
        table.appendChild(trh);
        for (const row of section.rows) {
          const tr = document.createElement("tr");
          for (const cell of row) {
            const td = document.createElement("td");
            td.textContent = cell == null ? "" : String(cell);
            tr.appendChild(td);
          }
          table.appendChild(tr);
        }
      } else if (section.type === "list") {
        for (const row of section.rows) {
          const tr = document.createElement("tr");
          const td = document.createElement("td");
          td.textContent = row[0] == null ? "" : String(row[0]);
          tr.appendChild(td); table.appendChild(tr);
        }
      }
    });
  } else if (source.rows && source.columns) {
    const thead = document.createElement("thead");
    const trh = document.createElement("tr");
    for (const c of source.columns) {
      const th = document.createElement("th"); th.textContent = c; trh.appendChild(th);
    }
    thead.appendChild(trh);
    table.appendChild(thead);
    const tbody = document.createElement("tbody");
    for (const row of source.rows) {
      const tr = document.createElement("tr");
      for (const c of source.columns) {
        const td = document.createElement("td");
        const v = row[c];
        td.textContent = v == null ? "" : String(v);
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
  }

  return table;
}

function renderXLSXPreview(body) {
  const sources = findTableSources();

  if (sources.length === 0) {
    const hint = document.createElement("div");
    hint.className = "xlsx-empty";
    hint.innerHTML = `
      <p>No XLSX-worthy structure detected.</p>
      <p>To produce sheets, either:</p>
      <ul>
        <li>Select an array of objects and set its role to <strong>Table</strong> — becomes one sheet.</li>
        <li>Select an array and enable <strong>Split</strong> — each child becomes its own sheet.</li>
      </ul>
      <p>Without either, Excel export falls back to a single flat path/value sheet.</p>
    `;
    body.appendChild(hint);
    return;
  }

  const wrap = document.createElement("div");
  wrap.className = "xlsx-preview";

  sources.forEach((source, i) => {
    const banner = document.createElement("div");
    banner.className = "file-banner xlsx-banner";
    const size = countSheetSize(source);
    const meta = source.sourcePath ? ` · <span class="src-path">${escapeHtmlAttr(source.sourcePath)}</span>` : "";
    banner.innerHTML = `<span class="file-ix">${String(i + 1).padStart(2, "0")}</span><span class="file-name">${escapeHtmlAttr(source.name)}</span><span class="file-size">${size.rows}×${size.cols}${meta}</span>`;
    wrap.appendChild(banner);

    const sheetWrap = document.createElement("div");
    sheetWrap.className = "xlsx-sheet-wrap";
    sheetWrap.appendChild(renderSheetHtml(source));
    wrap.appendChild(sheetWrap);
  });

  body.appendChild(wrap);
}

function renderOutput() {
  const body = document.getElementById("output-body");
  body.innerHTML = "";

  if (state.outputTab === "xlsx") {
    renderXLSXPreview(body);
    return;
  }

  if (state.outputTab === "split") {
    const files = generateFiles();
    const wrap = document.createElement("div");
    wrap.className = "split-plan";
    const h = document.createElement("h3");
    h.textContent = files.length > 1 ? `${files.length} files will be written` : "Single-file output";
    wrap.appendChild(h);
    const list = document.createElement("div"); list.className = "file-list";
    files.forEach(f => {
      const item = document.createElement("div"); item.className = "file-list-item";
      const n = document.createElement("span"); n.textContent = f.name;
      const s = document.createElement("span"); s.className = "size";
      s.textContent = `${f.content.split("\n").length} lines · ${f.content.length} chars`;
      item.appendChild(n); item.appendChild(s);
      list.appendChild(item);
    });
    wrap.appendChild(list);

    if (findTableSources().length > 0) {
      const ws = document.createElement("div");
      ws.style.marginTop = "24px";
      const wh = document.createElement("h3");
      wh.textContent = "XLSX sheets";
      ws.appendChild(wh);
      const wl = document.createElement("div"); wl.className = "file-list";
      findTableSources().forEach(s => {
        const item = document.createElement("div"); item.className = "file-list-item";
        const n = document.createElement("span"); n.textContent = s.name;
        const c = document.createElement("span"); c.className = "size";
        const size = countSheetSize(s);
        c.textContent = `${size.rows} rows · ${size.cols} cols`;
        item.appendChild(n); item.appendChild(c);
        wl.appendChild(item);
      });
      ws.appendChild(wl);
      wrap.appendChild(ws);
    }
    body.appendChild(wrap);
    return;
  }

  const files = generateFiles();
  const main = files[0];

  if (state.outputTab === "raw") {
    const pre = document.createElement("div");
    pre.className = "output-view raw";
    pre.textContent = files.length === 1 ? main.content :
      files.map(f => `=== ${f.name} ===\n\n${f.content}`).join("\n\n");
    body.appendChild(pre);
    return;
  }

  // preview
  if (files.length === 1) {
    const view = document.createElement("div");
    view.className = "output-view";
    view.innerHTML = mdToHtml(files[0].content);
    body.appendChild(view);
    return;
  }

  const container = document.createElement("div");
  container.className = "output-view multi";
  files.forEach((f, i) => {
    const banner = document.createElement("div");
    banner.className = "file-banner";
    banner.innerHTML = `<span class="file-ix">${String(i + 1).padStart(2, "0")}</span><span class="file-name">${escapeHtmlAttr(f.name)}</span><span class="file-size">${f.content.length} chars</span>`;
    container.appendChild(banner);
    const block = document.createElement("div");
    block.className = "file-block";
    block.innerHTML = mdToHtml(f.content);
    container.appendChild(block);
  });
  body.appendChild(container);
}

/* ══════════════════════════════════════════════════════════════
   RENDERING — INSPECTOR
   ══════════════════════════════════════════════════════════════ */
function renderInspector() {
  const body = document.getElementById("insp-body");
  body.innerHTML = "";

  // Document tab is always available, regardless of tree selection
  if (state.inspectorTab === "document") {
    renderDocumentInspector(body);
    return;
  }

  const path = state.selection;
  if (path === null) {
    body.innerHTML = `<div class="insp-placeholder">Select a node in the tree to configure how it renders or splits.</div>`;
    return;
  }
  const value = path.length === 0 ? state.doc : getAt(state.doc, path);
  if (value === undefined) {
    body.innerHTML = `<div class="insp-placeholder">Selection no longer exists.</div>`;
    return;
  }

  // Header: path + shape
  const header = document.createElement("div");
  header.className = "insp-section";
  header.innerHTML = `
    <label>Selection</label>
    <div class="insp-path">${path.length === 0 ? "$ (root)" : "$." + patternPath(path).replace(/^\$\.?/, "")}</div>
    <div class="insp-shape">${describeShape(value)}</div>
  `;
  body.appendChild(header);

  if (state.inspectorTab === "rule") renderRuleInspector(body, path, value);
  else if (state.inspectorTab === "split") renderSplitInspector(body, path, value);
}

function renderDocumentInspector(body) {
  const section = document.createElement("div");
  section.className = "insp-section";
  section.innerHTML = `
    <label>Document</label>
    <div class="insp-path">${escapeHtmlAttr(state.docName ? state.docName + ".json" : "(untitled)")}</div>
    <div class="insp-shape">${describeShape(state.doc)}</div>
  `;
  body.appendChild(section);

  // Document front matter
  const fmSection = document.createElement("div");
  fmSection.className = "insp-section";
  fmSection.innerHTML = `<h3>Document front matter</h3>`;
  const row = document.createElement("div"); row.className = "insp-row";
  const ta = document.createElement("textarea");
  ta.className = "insp-input insp-textarea";
  ta.rows = 8;
  ta.spellcheck = false;
  ta.placeholder = `---\ntitle: {$.title}\ndate: {$.timestamp}\nmode: {$.mode}\n---\n`;
  ta.value = state.docFrontMatter || "";
  ta.addEventListener("input", debounced(() => {
    pushHistory();
    state.docFrontMatter = ta.value;
    afterChange();
  }, 400));
  row.appendChild(ta);
  fmSection.appendChild(row);
  fmSection.insertAdjacentHTML("beforeend", `
    <div class="insp-help">Inserted at the top of the main output file. When splits are active, this goes into <code>index.md</code>. Per-split child files use the "Front matter" field in the Split tab instead.</div>
    <div class="insp-tokens" style="margin-top:8px;line-height:1.7;">
      Tokens (resolved against document root):<br>
      <code>{.field}</code> or <code>{$.field}</code> field from root<br>
      <code>{.nested.field}</code> nested lookup
    </div>
  `);
  body.appendChild(fmSection);

  // Quick stats
  const stats = document.createElement("div");
  stats.className = "insp-section";
  stats.innerHTML = `<h3>Summary</h3>`;
  const rules = Object.keys(state.rules).length;
  const splits = Object.values(state.splits).filter(s => s.enabled).length;
  const anns = Object.keys(state.annotations).length;
  let nodes = 0;
  (function count(v) { nodes++; if (v && typeof v === "object") { if (Array.isArray(v)) v.forEach(count); else Object.values(v).forEach(count); }})(state.doc);
  const kv = document.createElement("div");
  kv.className = "insp-tokens";
  kv.style.lineHeight = "1.8";
  kv.innerHTML = `
    Nodes: <code>${nodes}</code><br>
    Rules defined: <code>${rules}</code><br>
    Splits active: <code>${splits}</code><br>
    Annotations: <code>${anns}</code>
  `;
  stats.appendChild(kv);
  body.appendChild(stats);
}

function describeShape(v) {
  const t = typeOf(v);
  if (t === "array") {
    if (v.length === 0) return "array · empty";
    if (v.every(x => x && typeof x === "object" && !Array.isArray(x))) {
      const keys = new Set();
      v.forEach(x => Object.keys(x).forEach(k => keys.add(k)));
      return `array of ${v.length} objects · ${keys.size} distinct keys`;
    }
    return `array of ${v.length} ${typeOf(v[0])}s`;
  }
  if (t === "object") return `object · ${Object.keys(v).length} keys`;
  return `${t}`;
}

function renderRuleInspector(body, path, value) {
  const t = typeOf(value);
  const rule = getRule(path) || defaultRule();

  // Role
  const roleSection = document.createElement("div");
  roleSection.className = "insp-section";
  roleSection.innerHTML = `<h3>Render as</h3>`;
  const roles = [["auto", "Auto (default)"], ["heading", "Heading + contents"], ["table", "Table"], ["list", "Bullet list"], ["skip", "Skip (omit)"]];
  const radioWrap = document.createElement("div"); radioWrap.className = "insp-radio";
  const tableApplies =
    (t === "array" && value.length > 0 && value.every(x => x && typeof x === "object" && !Array.isArray(x))) ||
    (t === "object" && Object.keys(value).length > 0);
  for (const [val, label] of roles) {
    if (val === "table" && !tableApplies) continue;
    if (val === "list" && t !== "array") continue;
    const lab = document.createElement("label");
    lab.innerHTML = `<input type="radio" name="role" value="${val}" ${rule.role === val ? "checked" : ""}> ${label}`;
    radioWrap.appendChild(lab);
  }
  roleSection.appendChild(radioWrap);
  radioWrap.addEventListener("change", (e) => {
    if (e.target.name === "role") setRule(path, { role: e.target.value });
  });
  body.appendChild(roleSection);

  // Object table mode
  if (t === "object" && rule.role === "table") {
    const tmSection = document.createElement("div");
    tmSection.className = "insp-section";
    tmSection.innerHTML = `<h3>Table mode</h3>`;
    const row = document.createElement("div"); row.className = "insp-row";
    const sel = document.createElement("select"); sel.className = "insp-select";
    const allObjValues = Object.values(value).every(v => v && typeof v === "object" && !Array.isArray(v)) && Object.keys(value).length > 0;
    const modes = [["kv", "Key / Value pairs"]];
    if (allObjValues) modes.push(["rows", "Child objects as rows"]);
    for (const [v, l] of modes) {
      const o = document.createElement("option");
      o.value = v; o.textContent = l;
      if ((rule.tableMode || "kv") === v) o.selected = true;
      sel.appendChild(o);
    }
    sel.addEventListener("change", () => setRule(path, { tableMode: sel.value }));
    row.appendChild(sel);
    tmSection.appendChild(row);
    body.appendChild(tmSection);
  }

  // For tables: columns (arrays of objects, or object-as-table in rows mode)
  const showColumnsForArray = (rule.role === "table" || (rule.role === "auto" && t === "array")) && t === "array" && value.length > 0 && value.every(x => x && typeof x === "object" && !Array.isArray(x));
  const showColumnsForObject = t === "object" && rule.role === "table" && (rule.tableMode || "kv") === "rows" && Object.keys(value).length > 0 && Object.values(value).every(v => v && typeof v === "object" && !Array.isArray(v));
  if (showColumnsForArray || showColumnsForObject) {
    const sample = showColumnsForArray ? value : Object.values(value);
    const colSection = document.createElement("div");
    colSection.className = "insp-section";
    colSection.innerHTML = `<h3>Columns</h3>`;
    const allCols = inferColumns(sample);
    const active = rule.columns && rule.columns.length ? new Set(rule.columns) : new Set(allCols);
    const cb = document.createElement("div"); cb.className = "insp-checkboxes";
    for (const col of allCols) {
      const lab = document.createElement("label"); lab.className = "insp-check";
      const joinVal = rule.joins?.[col] ?? "";
      lab.innerHTML = `
        <input type="checkbox" value="${col}" ${active.has(col) ? "checked" : ""}>
        <span>${col}</span>
        <input type="text" class="join-input" placeholder="join" value="${escapeHtmlAttr(joinVal)}" title="Separator when value is an array">
      `;
      cb.appendChild(lab);
    }
    colSection.appendChild(cb);
    cb.addEventListener("change", (e) => {
      const checks = [...cb.querySelectorAll("input[type=checkbox]")].filter(c => c.checked).map(c => c.value);
      const joins = {};
      cb.querySelectorAll(".insp-check").forEach(row => {
        const col = row.querySelector("input[type=checkbox]").value;
        const j = row.querySelector(".join-input").value;
        if (j) joins[col] = j;
      });
      setRule(path, { columns: checks, joins });
    });
    cb.addEventListener("input", (e) => {
      if (!e.target.classList.contains("join-input")) return;
      const joins = {};
      cb.querySelectorAll(".insp-check").forEach(row => {
        const col = row.querySelector("input[type=checkbox]").value;
        const j = row.querySelector(".join-input").value;
        if (j) joins[col] = j;
      });
      setRule(path, { joins });
    });
    body.appendChild(colSection);
  }

  // Heading options
  if (t === "object" || t === "array") {
    const hSection = document.createElement("div");
    hSection.className = "insp-section";
    hSection.innerHTML = `<h3>Heading</h3>`;
    // Source options
    const options = [["key", "Key name"]];
    if (t === "array" && value.length > 0 && value[0] && typeof value[0] === "object") {
      for (const k of Object.keys(value[0])) {
        const v = value[0][k];
        if (typeof v === "string" || typeof v === "number") options.push(["." + k, `Use .${k}`]);
      }
    } else if (t === "object") {
      for (const k of Object.keys(value)) {
        const v = value[k];
        if (typeof v === "string" || typeof v === "number") options.push(["." + k, `Use .${k}`]);
      }
    }
    const srcRow = document.createElement("div"); srcRow.className = "insp-row";
    srcRow.innerHTML = `<label>Heading from</label>`;
    const sel = document.createElement("select"); sel.className = "insp-select";
    for (const [v, l] of options) {
      const opt = document.createElement("option"); opt.value = v; opt.textContent = l;
      if (v === rule.headingFrom) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.addEventListener("change", () => setRule(path, { headingFrom: sel.value }));
    srcRow.appendChild(sel);
    hSection.appendChild(srcRow);

    // Level
    const lvlRow = document.createElement("div"); lvlRow.className = "insp-row";
    lvlRow.innerHTML = `<label>Level</label>`;
    const lvlSel = document.createElement("select"); lvlSel.className = "insp-select";
    for (const v of ["auto", "1", "2", "3", "4", "5", "6"]) {
      const o = document.createElement("option"); o.value = v;
      o.textContent = v === "auto" ? "Auto (based on depth)" : `H${v}`;
      if (String(rule.headingLevel) === v) o.selected = true;
      lvlSel.appendChild(o);
    }
    lvlSel.addEventListener("change", () => {
      const v = lvlSel.value;
      setRule(path, { headingLevel: v === "auto" ? "auto" : parseInt(v) });
    });
    lvlRow.appendChild(lvlSel);
    hSection.appendChild(lvlRow);

    body.appendChild(hSection);
  }

  // Labels
  const labSection = document.createElement("div");
  labSection.className = "insp-section";
  labSection.innerHTML = `<h3>Label formatting</h3>`;
  const labRow = document.createElement("div"); labRow.className = "insp-radio";
  for (const [val, label] of [["titleCase", "Humanize (user_name → User name)"], ["asIs", "As-is (keep original keys)"]]) {
    const lab = document.createElement("label");
    lab.innerHTML = `<input type="radio" name="labelFormat" value="${val}" ${rule.labelFormat === val ? "checked" : ""}> ${label}`;
    labRow.appendChild(lab);
  }
  labRow.addEventListener("change", (e) => {
    if (e.target.name === "labelFormat") setRule(path, { labelFormat: e.target.value });
  });
  labSection.appendChild(labRow);
  body.appendChild(labSection);

  // Value formatting — only meaningful when leaves are emitted as "Key: value"
  const styleOptions = [["plain", "Plain"], ["bold", "Bold"], ["italic", "Italic"], ["boldItalic", "Bold italic"]];
  const fmtSection = document.createElement("div");
  fmtSection.className = "insp-section";
  fmtSection.innerHTML = `<h3>Markdown styling</h3>`;

  const keyRow = document.createElement("div"); keyRow.className = "insp-row";
  keyRow.innerHTML = `<label>Key style</label>`;
  const keySel = document.createElement("select"); keySel.className = "insp-select";
  for (const [v, l] of styleOptions) {
    const o = document.createElement("option"); o.value = v; o.textContent = l;
    if ((rule.keyStyle || "bold") === v) o.selected = true;
    keySel.appendChild(o);
  }
  keySel.addEventListener("change", () => setRule(path, { keyStyle: keySel.value }));
  keyRow.appendChild(keySel);
  fmtSection.appendChild(keyRow);

  const valRow = document.createElement("div"); valRow.className = "insp-row";
  valRow.innerHTML = `<label>Value style</label>`;
  const valSel = document.createElement("select"); valSel.className = "insp-select";
  for (const [v, l] of styleOptions) {
    const o = document.createElement("option"); o.value = v; o.textContent = l;
    if ((rule.valueStyle || "plain") === v) o.selected = true;
    valSel.appendChild(o);
  }
  valSel.addEventListener("change", () => setRule(path, { valueStyle: valSel.value }));
  valRow.appendChild(valSel);
  fmtSection.appendChild(valRow);

  // Decimal mark + decimals (rounding) — show whenever this subtree may contain numbers
  if (subtreeHasNumbers(value)) {
    const decRow = document.createElement("div"); decRow.className = "insp-row";
    decRow.innerHTML = `<label>Decimal mark (numbers)</label>`;
    const decSel = document.createElement("select"); decSel.className = "insp-select";
    for (const [v, l] of [[".", ".  (0.25)"], [",", ",  (0,25)"]]) {
      const o = document.createElement("option"); o.value = v; o.textContent = l;
      if ((rule.decimalMark || ".") === v) o.selected = true;
      decSel.appendChild(o);
    }
    decSel.addEventListener("change", () => setRule(path, { decimalMark: decSel.value }));
    decRow.appendChild(decSel);
    fmtSection.appendChild(decRow);

    const roundRow = document.createElement("div"); roundRow.className = "insp-row";
    roundRow.innerHTML = `<label>Decimal places</label>`;
    const roundSel = document.createElement("select"); roundSel.className = "insp-select";
    const roundOpts = [
      ["", "— (no rounding)"],
      ["0", "0  (1)"],
      ["1", "1  (1.2)"],
      ["2", "2  (1.23)"],
      ["3", "3  (1.234)"],
      ["4", "4  (1.2345)"],
      ["6", "6  (1.234567)"],
    ];
    for (const [v, l] of roundOpts) {
      const o = document.createElement("option"); o.value = v; o.textContent = l;
      const cur = rule.decimals === undefined ? "" : String(rule.decimals);
      if (cur === v) o.selected = true;
      roundSel.appendChild(o);
    }
    roundSel.addEventListener("change", () => setRule(path, { decimals: roundSel.value }));
    roundRow.appendChild(roundSel);
    fmtSection.appendChild(roundRow);
  }

  // Date format — applies to ISO 8601 string values
  if (subtreeHasISODates(value)) {
    const dateRow = document.createElement("div"); dateRow.className = "insp-row";
    dateRow.innerHTML = `<label>Date format (ISO strings)</label>`;
    const dateSel = document.createElement("select"); dateSel.className = "insp-select";
    const dateOpts = [
      ["none",     "— (raw, e.g. 2026-03-05T12:40)"],
      ["iso-date", "ISO date  (2026-03-05)"],
      ["short",    "Short  (Mar 5, 2026)"],
      ["medium",   "Medium  (March 5, 2026)"],
      ["time",     "Time only  (12:40 PM)"],
      ["datetime", "Date + time  (Mar 5, 2026, 12:40 PM)"],
    ];
    for (const [v, l] of dateOpts) {
      const o = document.createElement("option"); o.value = v; o.textContent = l;
      if ((rule.dateFormat || "none") === v) o.selected = true;
      dateSel.appendChild(o);
    }
    dateSel.addEventListener("change", () => setRule(path, { dateFormat: dateSel.value }));
    dateRow.appendChild(dateSel);
    fmtSection.appendChild(dateRow);
  }

  fmtSection.insertAdjacentHTML("beforeend", `<div class="insp-help">Applies when this node renders as <code>Key: value</code> leaves (inside objects or bullet lists).</div>`);
  body.appendChild(fmtSection);

  // Annotations — free-form text inserted before/after this node
  const ann = getAnnotation(path) || { before: "", after: "" };
  const annSection = document.createElement("div");
  annSection.className = "insp-section";
  annSection.innerHTML = `<h3>Annotations</h3>`;

  const beforePlaceholder = path.length === 0
    ? `---\ntitle: {$.title}\ndate: {$.timestamp}\n---\n`
    : `e.g.\n\n---\n\n### {.name}\n`;
  const afterPlaceholder = path.length === 0
    ? `\n---\n\n_Generated by Loom_\n`
    : `\n---\n`;

  const beforeRow = document.createElement("div"); beforeRow.className = "insp-row";
  beforeRow.innerHTML = `<label>Before this node</label>`;
  const beforeTa = document.createElement("textarea");
  beforeTa.className = "insp-input insp-textarea";
  beforeTa.rows = 5;
  beforeTa.placeholder = beforePlaceholder;
  beforeTa.spellcheck = false;
  beforeTa.value = ann.before || "";
  beforeTa.addEventListener("input", debounced(() => setAnnotation(path, { before: beforeTa.value }), 400));
  beforeRow.appendChild(beforeTa);
  annSection.appendChild(beforeRow);

  const afterRow = document.createElement("div"); afterRow.className = "insp-row";
  afterRow.innerHTML = `<label>After this node</label>`;
  const afterTa = document.createElement("textarea");
  afterTa.className = "insp-input insp-textarea";
  afterTa.rows = 4;
  afterTa.placeholder = afterPlaceholder;
  afterTa.spellcheck = false;
  afterTa.value = ann.after || "";
  afterTa.addEventListener("input", debounced(() => setAnnotation(path, { after: afterTa.value }), 400));
  afterRow.appendChild(afterTa);
  annSection.appendChild(afterRow);

  annSection.insertAdjacentHTML("beforeend", `
    <div class="insp-help">Raw Markdown inserted verbatim at this location. No blank lines are added — press Enter to add one. Newlines in the textarea become literal newlines in the output.</div>
    <div class="insp-tokens" style="margin-top:8px;line-height:1.7;">
      Value tokens (resolved when rendering):<br>
      <code>{.field}</code> field from this node &nbsp;
      <code>{.nested.field}</code> nested lookup<br>
      <code>{parent.field}</code> from parent object &nbsp;
      <code>{$.field}</code> from document root
    </div>`);
  body.appendChild(annSection);

  // Clear
  if (state.rules[patternPath(path)]) {
    const actions = document.createElement("div");
    actions.className = "insp-section";
